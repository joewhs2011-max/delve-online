// ═══════════ TILE CLICK (MOVE) ═══════════
function onTileClick(r,c){
  if(G.phase!=='moving')return;
  if(MP.mode==='client'){MP.hostConn.send({type:'action',action:'move',row:r,col:c});return}
  const m=G.moves.find(x=>x.row===r&&x.col===c);if(!m)return;
  const p=cp();p.row=r;p.col=c;

  // Check portal pass
  if(m.path)for(const[pr,pc]of m.path){if(G.board[pr][pc].type==='portal'&&canPortal(p))p.portal=true}

  // Ranger Precision: +1 coin per gap tile crossed in the path
  if(p.ch==='ranger'&&p.lv>=1&&m.path&&m.path.length>=2){
    let gaps=0;
    for(let i=0;i<m.path.length-1;i++){
      const[r1,c1]=m.path[i],[r2,c2]=m.path[i+1];
      if(r1===r2){// same row — count empty tiles between
        const minC=Math.min(c1,c2),maxC=Math.max(c1,c2);
        for(let gc=minC+1;gc<maxC;gc++){if(G.board[r1][gc].type==='empty')gaps++}
      }
    }
    if(gaps>0){let cg=gaps;if(hasItem(p,'coinPouch'))cg+=1;p.coins+=cg;log(`Precision: +${cg} coins (${gaps} gap${gaps>1?'s':''} crossed)`,'level')}
  }

  clearHL();renderTokens();
  log(`${p.name} moved to row ${r+1}, col ${c+1}`,'info');

  const t=G.board[r][c];if(t.type==='dungeonDoor')t.doorVisited=true;

  G.phase='resolving';
  resolveTile(p,t);
}

// ═══════════ TILE RESOLUTION ═══════════
async function resolveTile(p,t){
  switch(t.type){
    case'coin':{let a=t.value||0;if(a>0){if(hasItem(p,'coinPouch'))a+=1;p.coins+=a;log(`+${a} coins`,'reward');showResolveFloat(p,`+${a} 🪙`,'reward')}break}
    case'heart':{const a=t.value||0;if(a>0){p.hp=p.hp+(a);log(`+${a} hearts`,'reward');showResolveFloat(p,`+${a} ❤️`,'reward')}else if(a<0){p.hp=Math.max(0,p.hp+a);log(`${a} hearts`,'damage');showResolveFloat(p,`${a} ❤️`,'damage')}break}
    case'coinHeart':{let cg=1;if(hasItem(p,'coinPouch'))cg+=1;p.coins+=cg;p.hp=p.hp+(1);log(`+${cg} coins, +1 heart`,'reward');showResolveFloat(p,`+${cg} 🪙 +1 ❤️`,'reward');break}
    case'treasure':{
      if(t.available&&p.treasures.length<getCap(p)){
        t.available=false;p.treasures.push({v:t.value,dbl:false,r:t.row,c:t.col});p.tGain++;
        log(`Found ${t.value}pt treasure!`,'reward');showResolveFloat(p,`🧰 ${t.value}pt Treasure!`,'reward');
        if(p.ch==='knight'&&p.lv>=2){p.hp=p.hp+(3);log('Valor: +3 hearts','level')}
        if(p.ch==='barbarian'&&p.lv>=2){const m=p.mhp-p.hp;if(m>0){let cg=m;if(hasItem(p,'coinPouch'))cg+=1;p.coins+=cg;log(`Rampart: +${cg} coins`,'level')}}
        if(p.bullseye&&p.bullseye.r===t.row&&p.bullseye.c===t.col){p.jewels+=2;p.jGain+=2;log('Bullseye! +2 jewels!','level');p.bullseye=null}
        // If another player's bullseye was on this treasure, clear it (they lost it)
        G.players.forEach(op=>{if(op!==p&&op.bullseye&&op.bullseye.r===t.row&&op.bullseye.c===t.col){op.bullseye=null;log(`${op.name}'s Bullseye target was taken!`,'damage')}});
        if(p._dblVal){p.treasures[p.treasures.length-1].v*=2;log('Double Time: treasure doubled!','level')}
        updateTile(t);
      }else if(!t.available)log('Treasure already taken','info');
      else log('Inventory full!','damage');
      break}
    case'jewel':{if(t.available){t.available=false;p.jewels++;p.jGain++;log('+1 jewel! (+10pts)','reward');showResolveFloat(p,'💎 +1 Jewel!','reward');
      if(p.ch==='knight'&&p.lv>=2){p.hp=p.hp+(3);log('Valor: +3 hearts','level')}
      if(p._dblVal){p.jewels++;p.jGain++;log('Double Time: jewel doubled!','level')}
      updateTile(t)}else log('Jewel already taken','info');break}
    case'cursedJewel':{p.cursed++;log('Cursed jewel! (-10pts)','damage');showResolveFloat(p,'💜 Cursed! -10pts','damage');break}
    case'mysteryBox':{await rollMB(p);break}
    case'superMysteryBox':{await rollSMB(p);break}
    case'trap':{
      if(p.ch==='knight'&&p.lv>=1){
        log('En Garde! Avoids trap, +1 move','level');
        if(p.lv>=3){let cg=3;if(hasItem(p,'coinPouch'))cg+=1;p.coins+=cg;log(`Holy Grail: +${cg} coins`,'level')}
        calcMoves(p,1);G.phase='moving';hlMoves();return;
      }
      await rollTrap(p);break}
    case'shop':{openShop(p);return}
    case'bonfire':{
      if(hasItem(p,'kindling')){p.hp=p.mhp;log('Kindling: full health!','reward');showResolveFloat(p,'🔥 Full Health!','reward')}
      else{p.hp=p.hp+(1);log('+1 heart','reward');showResolveFloat(p,'🔥 +1 ❤️','reward')}
      p.bfProt=true;break}
    case'web':{if(!webImmune(p))log('Stuck in web! Turn ends.','damage');
      else{log('Passed through web!','info');if(p.ch==='speedster'&&p.lv>=2){let cg=3;if(hasItem(p,'coinPouch'))cg+=1;p.coins+=cg;log(`Nitro: +${cg} coins`,'level')}}break}
    case'levelUp':{if(p.lv<3){p.lv++;log(`Level Up! Lv${p.lv}: ${CHARS[p.ch].ab[p.lv]?.n||''}`,'level');showResolveFloat(p,`⬆️ Level ${p.lv}!`,'level')}else log('Already max level','info');break}
    case'loseTurn':{p.lostTurn=true;log('Will lose next turn!','damage');break}
    case'dungeonDoor':{
      if(getPts(p)>=175){p._enteredViaDoor=true;log(`Dungeon door opened! ${p.name} enters the final zone!`,'level')}
      else{log(`Dungeon door. Need ${175-getPts(p)} more pts to enter final zone.`,'damage')}
      break}
    case'playerTile':{if(t.extra===p.ch){log(`${p.name} activates their player tile!`,'level');await resolvePT(p);return}
      else log(`${CHARS[t.extra]?.name||t.extra}'s tile (no effect)`,'info');break}
    case'finish':{if(getPts(p)>=175){G.over=true;showWin(p);return}else log(`Need ${175-getPts(p)} more pts to finish!`,'damage');break}
    case'portal':{log(`${t.extra} portal`,'info');break}
    case'arrow':{
      // Arrow forces player to move in the arrow direction, then resolve new tile
      const dir=t.extra; // 'up','down','left','right'
      let nr=p.row,nc=p.col;
      if(dir==='up')nr--;else if(dir==='down')nr++;else if(dir==='left')nc--;else if(dir==='right')nc++;
      if(nr>=0&&nr<G.board.length&&nc>=0&&nc<G.board[0].length&&G.board[nr][nc].type!=='empty'){
        p.row=nr;p.col=nc;renderTokens();log(`Arrow pushed ${dir}!`,'info');
        await resolveTile(p);return;
      } else{log(`Arrow ${dir} (edge, no movement)`,'info')}
      break}
    case'start':{log('At start','info');break}
  }
  // Skip post-move and finishRes if this is a sub-resolution or phase was set to 'moving' (e.g. MB #8)
  if(!p._inLeap&&!p._inBoomerang&&!p._inSwap&&!p._inRope&&G.phase!=='moving'){
    await postMove(p);
    finishRes();
  }
}

// ═══════════ POST-MOVEMENT ABILITIES ═══════════
async function postMove(p){
  // Ranger Boomerang
  if(p.ch==='ranger'&&p.lv>=2&&p.startTile){
    const st=p.startTile;
    if((st.row!==p.row||st.col!==p.col)&&!(p.lastBoom&&p.lastBoom.row===st.row&&p.lastBoom.col===st.col)){
      const ch=await showChoice('Boomerang',`Return to start tile and gain reward?`,['Boomerang Back','Skip']);
      if(ch==='Boomerang Back'){p.lastBoom={row:st.row,col:st.col};p.row=st.row;p.col=st.col;renderTokens();
        const bt=G.board[st.row][st.col];log('Boomerang!','level');
        p._inBoomerang=true;
        await resolveTile(p,bt);
        p._inBoomerang=false;
      }
    }
  }
  // Wizard Ethereal Surprise
  if(p.ch==='wizard'&&p.lv>=2&&p.portal){log('Ethereal Surprise!','level');await rollMB(p)}
  // Speedster Twin Turbo
  if(p.ch==='speedster'&&p.lv>=3&&G.dv.length===2&&G.dv[0]===G.dv[1]){log('Twin Turbo! Doubles = extra turn!','level');p._extra=true}
}

async function finishRes(){
  const p=cp();
  // Barbarian Leap — AFTER all tile effects and abilities resolve (skip if already in leap)
  // Leap can jump PAST gaps to the next available tile vertically
  if(p.ch==='barbarian'&&p.lv>=1&&!p._inLeap){
    const targets=[];
    // Scan upward past gaps to find first non-empty tile
    for(let nr=p.row-1;nr>=0;nr--){
      const tile=G.board[nr]?.[p.col];
      if(tile&&tile.type!=='empty'){
        if(!isFinalZone(nr,p.col))targets.push({row:nr,col:p.col,dir:'up'});
        break;
      }
    }
    // Scan downward past gaps to find first non-empty tile
    for(let nr=p.row+1;nr<G.board.length;nr++){
      const tile=G.board[nr]?.[p.col];
      if(tile&&tile.type!=='empty'){
        if(isDeepDelve(nr)&&!isDeepDelve(p.row)&&!canEnterDeepDelve(p))break;
        targets.push({row:nr,col:p.col,dir:'down'});
        break;
      }
    }

    if(targets.length){
      renderBoard();
      let leapChoice;
      // Check if this is a remote player
      const isRemote=MP.mode==='host'&&MP.conns.some(c=>c._mpIdx===G.cpi);
      if(isRemote){
        leapChoice=await remotePickTile(targets,'Barbarian Leap: click an orange tile to leap, or your tile to skip',true,{row:p.row,col:p.col});
        if(leapChoice)leapChoice=targets.find(t=>t.row===leapChoice.row&&t.col===leapChoice.col)||null;
      } else {
        log('Barbarian Leap: click an orange tile to leap, or your tile to skip','info');
        targets.forEach(t=>{const td=document.getElementById(`t${t.row}-${t.col}`);if(td)td.classList.add('leap-target')});
        const curTd=document.getElementById(`t${p.row}-${p.col}`);
        if(curTd)curTd.classList.add('leap-skip');
        leapChoice=await new Promise(resolve=>{
          const handlers=[];
          targets.forEach(t=>{const td=document.getElementById(`t${t.row}-${t.col}`);if(!td)return;
            const h=()=>resolve(t);td.addEventListener('click',h,{once:true});handlers.push({el:td,fn:h})});
          if(curTd){const h=()=>resolve(null);curTd.addEventListener('click',h,{once:true});handlers.push({el:curTd,fn:h})}
          window._leapH=handlers;
        });
        document.querySelectorAll('.leap-target,.leap-skip').forEach(t=>t.classList.remove('leap-target','leap-skip'));
        if(window._leapH){window._leapH.forEach(h=>{try{h.el.removeEventListener('click',h.fn)}catch(e){}});window._leapH=null}
      }

      if(leapChoice){
        p.row=leapChoice.row;p.col=leapChoice.col;renderTokens();
        log(`Leaped ${leapChoice.dir}!`,'level');
        const lt=G.board[p.row][p.col];
        // Seismic Slam: if treasure gained from leap, +1 jewel (tracked via flag)
        const tBefore=p.treasures.length;
        p._inLeap=true; // prevent recursive leap from finishRes
        await resolveTile(p,lt);
        if(p.lv>=3&&p.treasures.length>tBefore){p.jewels++;log('Seismic Slam: +1 jewel from leap treasure!','level')}
        p._inLeap=false;
      }else log('Leap skipped','info');
    }
  }
  // Offer rope at end of turn (if they still have one and didn't already use one this turn)
  if(hasItem(p,'utilityRope')&&!p._inRope&&getRopeTargets(p).length){
    await useRope(p,'end of turn');
  }
  // Boot player from final zone if they drop below 175pts
  if(isFinalZone(p.row,p.col)&&getPts(p)<175){
    // Find dungeon door tile
    let ddR=null,ddC=null;
    G.board.forEach(row=>row.forEach(t=>{if(t.type==='dungeonDoor'){ddR=t.row;ddC=t.col}}));
    if(ddR!==null){p.row=ddR;p.col=ddC;p._enteredViaDoor=false;renderTokens();
      log(`${p.name} dropped below 175pts! Booted to dungeon door!`,'damage')}
  }
  // Turn end sound + recap popup
  sfxTurnEnd();broadcastPopup('sfx',{sfx:'turnEnd'});
  await showTurnRecap(p);
  G.phase='endTurn';renderSB();renderBoard();
  broadcastState('endResolve');
  // Auto-end turn after brief delay
  setTimeout(()=>{if(G.phase==='endTurn')endTurn()},500);
}

// ═══════════ TURN RECAP ═══════════
function showTurnRecap(p){
  return new Promise(resolve=>{
    const ch=CHARS[p.ch];
    const hpDiff=p.hp-(p._turnHP||p.hp);
    const coinDiff=p.coins-(p._turnCoins||p.coins);
    const jewelDiff=p.jewels-(p._turnJewels||p.jewels);
    const newTreasures=p.treasures.slice(p._turnTreasures||0);

    const gains=[];
    if(hpDiff>0)gains.push(`<span style="color:#e74c3c">+${hpDiff} ❤️</span>`);
    if(hpDiff<0)gains.push(`<span style="color:#e74c3c">${hpDiff} ❤️</span>`);
    if(coinDiff>0)gains.push(`<span style="color:#f1c40f">+${coinDiff} 🪙</span>`);
    if(coinDiff<0)gains.push(`<span style="color:#f1c40f">${coinDiff} 🪙</span>`);
    if(jewelDiff>0)gains.push(`<span style="color:#ffd700">+${jewelDiff} 💎</span>`);
    newTreasures.forEach(t=>gains.push(`<span style="color:#d4a017">🧰 ${t.v}pt</span>`));
    if(p.lv>(p._turnLv||0))gains.push(`<span style="color:#00d2ff">⬆️ Level ${p.lv}!</span>`);

    // Log public turn summary for all players
    const summaryParts=[];
    if(hpDiff>0)summaryParts.push(`+${hpDiff} hearts`);
    if(hpDiff<0)summaryParts.push(`${hpDiff} hearts`);
    if(coinDiff>0)summaryParts.push(`+${coinDiff} coins`);
    if(coinDiff<0)summaryParts.push(`${coinDiff} coins`);
    if(jewelDiff>0)summaryParts.push(`+${jewelDiff} jewels`);
    newTreasures.forEach(t=>summaryParts.push(`${t.v}pt treasure`));
    if(p.lv>(p._turnLv||0))summaryParts.push(`leveled up to Lv${p.lv}`);
    const summary=summaryParts.length?summaryParts.join(', '):'no changes';
    log(`📢 ${p.name}'s turn: ${summary} | HP:${p.hp}/${p.mhp} Coins:${p.coins} Pts:${getPts(p)}`,'info');

    // Broadcast recap to all clients
    broadcastPopup('turnRecap',{recap:{name:p.name,ch:p.ch,hp:p.hp,mhp:p.mhp,coins:p.coins,pts:getPts(p),gains:gains.map(g=>g),hpDiff,coinDiff,jewelDiff,newTreasures,lvUp:p.lv>(p._turnLv||0)?p.lv:0}});
    broadcastPopup('log',{msg:`📢 ${p.name}'s turn: ${summary} | HP:${p.hp}/${p.mhp} Coins:${p.coins} Pts:${getPts(p)}`,tone:'info'});

    const overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9998;display:flex;align-items:center;justify-content:center';
    const box=document.createElement('div');
    box.style.cssText='background:linear-gradient(135deg,#1a1a3e,#0a0a1a);border:4px solid '+ch.color+';border-radius:16px;padding:30px 40px;text-align:center;max-width:560px;min-width:400px;font-family:"Press Start 2P",monospace;box-shadow:0 0 40px rgba(0,0,0,.8),0 0 20px '+ch.color+'40';
    box.innerHTML=`
      <div style="font-size:24px;color:${ch.color};margin-bottom:12px">${ch.icon} ${p.name}</div>
      <div style="font-size:14px;color:#aaa;margin-bottom:16px;letter-spacing:3px">TURN RECAP</div>
      <div style="display:flex;justify-content:space-around;margin-bottom:16px;font-size:16px">
        <div>❤️ ${p.hp}/${p.mhp}</div>
        <div>🪙 ${p.coins}</div>
        <div>⭐ ${getPts(p)}</div>
      </div>
      ${gains.length?`<div style="font-size:13px;color:#ccc;margin-bottom:10px">This turn:</div><div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-size:16px;margin-bottom:16px">${gains.join('')}</div>`:`<div style="font-size:13px;color:#888;margin-bottom:16px">No changes this turn</div>`}
      <button style="background:${ch.color};color:#fff;border:none;padding:10px 28px;border-radius:8px;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:12px" id="recapOk">OK</button>`;
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    document.getElementById('recapOk').onclick=()=>{overlay.remove();resolve()};
  });
}

// ═══════════ UTILITY ROPE ═══════════
function getRopeTargets(p){
  const targets=[];
  for(let dr=-3;dr<=3;dr++){
    if(dr===0)continue;
    const nr=p.row+dr;
    if(nr>=0&&nr<G.board.length&&G.board[nr][p.col].type!=='empty'){
      if(isFinalZone(nr,p.col))continue;
      if(isDeepDelve(nr)&&!isDeepDelve(p.row)&&!canEnterDeepDelve(p))continue;
      targets.push({row:nr,col:p.col,dir:dr<0?'up':'down',dist:Math.abs(dr)});
    }
  }
  return targets;
}

async function useRope(p,phase){
  if(!hasItem(p,'utilityRope'))return false;
  const targets=getRopeTargets(p);
  if(!targets.length){log('No valid rope targets','info');return false}
  const ch=await showChoice('🪢 Utility Rope',`Use rope to climb/descend up to 3 floors? (${phase})`,['Use Rope','Skip']);
  if(ch==='Skip')return false;
  // Show targets
  targets.forEach(t=>{const td=document.getElementById(`t${t.row}-${t.col}`);if(td)td.classList.add('leap-target')});
  const curTd=document.getElementById(`t${p.row}-${p.col}`);
  if(curTd)curTd.classList.add('leap-skip');
  log('Click a highlighted tile to rope to, or your tile to cancel','info');
  const choice=await new Promise(resolve=>{
    const handlers=[];
    targets.forEach(t=>{const td=document.getElementById(`t${t.row}-${t.col}`);if(!td)return;
      const h=()=>resolve(t);td.addEventListener('click',h,{once:true});handlers.push({el:td,fn:h})});
    if(curTd){const h=()=>resolve(null);curTd.addEventListener('click',h,{once:true});handlers.push({el:curTd,fn:h})}
    window._ropeH=handlers;
  });
  document.querySelectorAll('.leap-target,.leap-skip').forEach(t=>t.classList.remove('leap-target','leap-skip'));
  if(window._ropeH){window._ropeH.forEach(h=>{try{h.el.removeEventListener('click',h.fn)}catch(e){}});window._ropeH=null}
  if(!choice){log('Rope cancelled','info');return false}
  // Use rope — consume it
  const idx=p.items.indexOf('utilityRope');
  if(idx>=0)p.items.splice(idx,1);
  p.row=choice.row;p.col=choice.col;renderTokens();
  log(`Roped ${choice.dist} floor(s) ${choice.dir}! (rope consumed)`,'level');
  showResolveFloat(p,`🪢 Rope ${choice.dir}!`,'level');
  const lt=G.board[p.row][p.col];
  p._inRope=true;
  await resolveTile(p,lt);
  p._inRope=false;
  renderSB();renderBoard();
  return true;
}

  2:{icon:'⚠️',text:'Roll on the Trap Table!',tone:'bad'},

async function showRollPopup(type, numDice, diceVals, total, outcome){
  // Broadcast to all clients
  broadcastPopup('rollPopup',{rollType:type,numDice,diceVals,total,outcome});
  return new Promise(resolve=>{
    const popup=document.getElementById('rollPopup');
    const box=document.getElementById('rollBox');
    const title=document.getElementById('rollTitle');
    const icon=document.getElementById('rollIcon');
    const diceRow=document.getElementById('rollDiceRow');
    const totalEl=document.getElementById('rollTotal');
    const outcomeEl=document.getElementById('rollOutcome');
    const btn=document.getElementById('rollContinueBtn');

    // Set theme
    box.className='roll-box '+type;
    title.className='roll-title '+type;
    title.textContent=type==='mystery'?'MYSTERY BOX':type==='super'?'SUPER MYSTERY BOX':'TRAP';
    icon.textContent=type==='mystery'?'❓':type==='super'?'⭐':'⚠️';
    totalEl.textContent='';
    outcomeEl.textContent='';
    outcomeEl.className='roll-outcome';
    outcomeEl.style.display='none';

    // Create dice
    diceRow.innerHTML='';
    for(let i=0;i<numDice;i++){
      const die=document.createElement('div');
      die.className='roll-die rolling';
      die.id=`rpd${i}`;
      die.textContent='?';
      diceRow.appendChild(die);
    }

    btn.style.display='none';
    popup.classList.add('active');

    // Animate dice
    const animInterval=setInterval(()=>{
      for(let i=0;i<numDice;i++){
        document.getElementById(`rpd${i}`).textContent=d6();
      }
    },80);

    // Land dice after delay
    setTimeout(()=>{
      clearInterval(animInterval);
      for(let i=0;i<numDice;i++){
        const die=document.getElementById(`rpd${i}`);
        die.textContent=diceVals[i];
        die.classList.remove('rolling');
        die.classList.add('landed');
      }
      totalEl.textContent=numDice>1?`Total: ${total}`:`Rolled: ${total}`;

      // Show outcome after brief pause
      setTimeout(()=>{
        outcomeEl.style.display='block';
        outcomeEl.innerHTML=`<div style="font-size:28px;margin-bottom:6px">${outcome.icon}</div><div>${outcome.text}</div>`;
        outcomeEl.className=`roll-outcome ${outcome.tone}`;
        btn.style.display='inline-block';
        btn.onclick=()=>{popup.classList.remove('active');resolve()};
      },500);
    },900);
  });
}

    case 7:{const d=d6();let a=d;if(hasItem(p,'coinPouch'))a+=1;p.coins+=a;log(`Rolled ${d}: +${a} coins`,'reward');break}

async function rollTrap(p){
  const d1=d6(),d2=d6(),tot=d1+d2;
  const outcome=TRAP_OUTCOMES[tot]||{icon:'⚠️',text:'Unknown',tone:'bad'};
  await showRollPopup('trap',2,[d1,d2],tot,outcome);
  log(`Trap: ${d1}+${d2}=${tot}`,'damage');
  if(p.ch==='knight'&&p.lv>=3){let cg=3;if(hasItem(p,'coinPouch'))cg+=1;p.coins+=cg;log(`Holy Grail: +${cg} coins`,'level')}
  switch(tot){
    case 2:log('Trap: 2 more traps!','damage');await rollTrap(p);await rollTrap(p);break;
    case 3:p.cursed++;log('Cursed jewel! (-10pts)','damage');break;
    case 4:{const d=d6();p.hp=Math.max(0,p.hp-d);log(`-${d} hearts!`,'damage');break}
    case 5:if(p.row<G.board.length-1){const nr=p.row+1;if(isDeepDelve(nr)&&!isDeepDelve(p.row)&&!canEnterDeepDelve(p)){log('Blocked from deep delve (need 30+ pts)','info')}else{p.row=nr;renderTokens();log('Delve 1 floor!','damage')}}break;
    case 6:{const d=d6();
      if(isFinalZone(p.row,p.col)){
        // In final zone, move backwards towards dungeon door (don't exit final zone)
        // Final zone cols are 26-29 (rows 0-4), move toward col 26
        let ddR=null,ddC=null;G.board.forEach(row=>row.forEach(t=>{if(t.type==='dungeonDoor'){ddR=t.row;ddC=t.col}}));
        p.col=Math.max(26,p.col-d);renderTokens();log(`Moved back ${d} (final zone)!`,'damage');
      } else {p.col=Math.max(0,p.col-d);renderTokens();log(`Moved back ${d}!`,'damage')}
      break}
    case 7:p.movMod=-2;log('-2 next movement','damage');break;
    case 8:p.lostTurn=true;log('Lose a turn!','damage');break;
    case 9:{const a=d6()+d6();p.coins=Math.max(0,p.coins-a);log(`-${a} coins!`,'damage');break}
    case 10:{const doors=findType('dungeonDoor');if(doors.length){p.row=doors[0].row;p.col=doors[0].col;renderTokens();log('Teleported to dungeon door!','damage')}break}
    case 11:if(p.items.length){const lost=p.items.pop();const it=SHOP.find(x=>x.id===lost);log(`Lost ${it?.n||lost}!`,'damage')}else if(p.jewels>0){p.jewels--;log('Lost a jewel!','damage')}else log('Nothing to lose','info');break;
    case 12:log('Trap: Mystery Box roll!','reward');await rollMB(p);break;
  }
  renderSB();
}

async function resolvePT(p){
  switch(p.ch){
    case'barbarian':{const pick=await pickTileOfType('bonfire','War Cry! Click a bonfire to teleport to');
      if(pick){const hr=p.mhp-p.hp;p.hp=p.mhp;let cg=hr;if(hasItem(p,'coinPouch'))cg+=1;p.coins+=cg;p.row=pick.row;p.col=pick.col;p.bfProt=true;renderTokens();log(`War Cry! Full HP, +${cg} coins!`,'level')}break}
    case'knight':{p.bfProt=true;log('Holy Martyrdom: no HP loss next round','level');
      while(p.hp>=3){const ch=await showChoice('Holy Martyrdom',`Sacrifice 3 hearts for jewel? (${p.hp} HP)`,['Sacrifice','Done']);
        if(ch==='Sacrifice'){p.hp-=3;p.jewels++;log('Sacrificed 3 hearts → +1 jewel','level');renderSB()}else break}break}
    case'ranger':{const pick=await pickTileOfType('treasure','Bullseye! Click a treasure to mark',t=>t.available);
      if(pick){p.bullseye={r:pick.row,c:pick.col};renderBoard();log(`Bullseye on ${pick.value}pt treasure!`,'level')}break}
    case'speedster':{if(!p.usedPT){p.usedPT=true;const a=d6(),b=d6(),c=d6();log(`Double Time! ${a},${b},${c}`,'level');
      const combos=[{l:`${a}+${b}=${a+b}`,v:a+b},{l:`${a}+${c}=${a+c}`,v:a+c},{l:`${b}+${c}=${b+c}`,v:b+c}];
      const ch=await showChoice('Double Time','Pick 2 dice:',combos.map(x=>x.l));const pick=combos.find(x=>x.l===ch);
      if(pick){p._dblVal=true;G.dice=pick.v;calcMoves(p,pick.v);G.phase='moving';hlMoves();log(`Moving ${pick.v} (doubled values!)`,'level');return}}break}
    case'wizard':{const portals=findType('portal');if(portals.length){const names=portals.map(t=>`${t.extra} (R${t.row+1},C${t.col+1})`);
      const ch=await showChoice('Quantum Entanglement','Teleport to portal:',names);const idx=names.indexOf(ch);
      if(idx>=0){p.row=portals[idx].row;p.col=portals[idx].col;renderTokens();log(`Teleported to ${portals[idx].extra} portal!`,'level');
        p.portal=true;calcMoves(p,2);G.phase='moving';hlMoves();return}}break}
  }
  finishRes();
}

async function openShop(p,free=false){
  // For remote players, use showChoice-based shop
  const isRemote=MP.mode==='host'&&MP.conns.some(c=>c._mpIdx===G.cpi);
  if(isRemote){
    let shopping=true;
    while(shopping){
      const avail=SHOP.filter(it=>{
        const own=p.items.includes(it.id),ok=free||p.coins>=it.cost,uniq=it.u&&own;
        return (ok||free)&&!uniq;
      });
      const opts=avail.map(it=>`${it.ic} ${it.n} (${free?'FREE':it.cost+'🪙'}) - ${it.d}`);
      opts.push('Close Shop');
      const ch=await showChoice('🛒 DELVE SHOP',`Coins: ${p.coins}`,opts);
      if(ch==='Close Shop'){shopping=false}
      else{const idx=opts.indexOf(ch);if(idx>=0&&idx<avail.length){buyItem(p,avail[idx],free);if(free)return}}
    }
    finishRes();return;
  }
  const g=document.getElementById('shopG');g.innerHTML='';
  SHOP.forEach(it=>{
    const own=p.items.includes(it.id),ok=free||p.coins>=it.cost,uniq=it.u&&own;
    const d=document.createElement('div');d.className=`si ${(!ok&&!free)||uniq?'no':''}`;
    d.innerHTML=`<div class="sic">${it.ic}</div><div class="sin">${it.n}</div><div class="sip">🪙 ${free?'FREE':it.cost}</div><div class="sid">${it.d}</div>${own?'<div style="color:var(--green);font-size:9px">OWNED</div>':''}`;
    if((ok||free)&&!uniq)d.onclick=()=>buyItem(p,it,free);
    g.appendChild(d);
  });
  showMo('shopMo');
}

function buyItem(p,it,free=false){
  if(it.id==='jewels'){if(!free)p.coins-=it.cost;p.jewels++;log(`Bought Jewel! (+10pts)`,'reward')}
  else if(it.id==='elixirOfLife'){if(!free)p.coins-=it.cost;p.hp=10;p.mhp=Math.max(p.mhp,10);p.items.push(it.id);log('Elixir of Life! 10 hearts','reward')}
  else{if(!free)p.coins-=it.cost;p.items.push(it.id);log(`Bought ${it.n}!`,'reward')}
  renderSB();if(free){closeMo('shopMo');finishRes()}else openShop(p);
}

// ═══════════ TURN MANAGEMENT ═══════════
function endTurn(){
  if(G.phase!=='endTurn')return;
  if(MP.mode==='client'){MP.hostConn.send({type:'action',action:'endTurn'});return}
  const p=cp();p._dblVal=false;

  // SMB bonus check
  if(p._smbBonus&&p.tGain>0){p.hp=p.mhp;p.jewels++;log('Super MB bonus: full HP + jewel!','level');p._smbBonus=false}

  if(p._extra){p._extra=false;G.phase='rolling';document.getElementById('rollBtn').disabled=!isMyTurn();document.getElementById('endBtn').disabled=true;renderDice();log(`${p.name} takes extra turn!`,'info');broadcastState('extraTurn');return}

  G.cpi=(G.cpi+1)%G.players.length;
  if(G.cpi===0)newRound();else startTurn();
}

function newRound(){
  G.round++;document.getElementById('rndI').textContent=`Round ${G.round}`;
  log(`\n═══ Round ${G.round} ═══`,'info');

  G.players.forEach(p=>{
    if(p.bfProt){p.bfProt=false;log(`${p.name}: bonfire protection`,'info');p.usedPT=false;return}
    const z=getZone(p.row),cost=getHPCost(z);
    if(cost>0){
      if(p.hp<cost){
        // Can't pay the HP cost — death
        if(p.extraLife){p.extraLife=false;p.hp=p.mhp;log(`${p.name}: Can't pay ${cost} HP but Extra Life saves them!`,'reward')}
        else{log(`${p.name} can't pay ${cost} HP (has ${p.hp}) — died!`,'damage');handleDeath(p)}
      }else{
        p.hp-=cost;log(`${p.name}: -${cost} HP (${z} zone)`,'damage');
      }
    }
    p.usedPT=false;
    // Low health warning
    if(p.hp===1&&p.hp>0){sfxLowHealth(CHARS[p.ch].name.toUpperCase());broadcastPopup('sfx',{sfx:'lowHealth',name:CHARS[p.ch].name.toUpperCase()})}
  });
  startTurn();
}

function handleDeath(p){
  sfxDeath();broadcastPopup('sfx',{sfx:'death'});
  log(`${p.name} died!`,'damage');
  if(p.treasures.length){
    p.treasures.sort((a,b)=>a.v-b.v);
    const d=p.treasures.shift();
    // Restore the treasure to its original tile on the board
    const origTile=G.board[d.r]?.[d.c];
    if(origTile&&origTile.type==='treasure'){origTile.available=true;updateTile(origTile)}
    log(`Dropped ${d.v}pt treasure on R${d.r+1},C${d.c+1}`,'damage');
  }
  let sr=0,sc=5; // Start position: C5 R0
  p.row=sr;p.col=sc;p.hp=p.mhp;p._enteredViaDoor=false;log(`${p.name} respawns at start`,'info');renderBoard();
}

function showTurnBanner(p){
  broadcastPopup('turnBanner',{cpi:G.cpi});
  sfxTurnStart(p.ch);
  const old=document.querySelector('.turn-banner');if(old)old.remove();
  const c=CHARS[p.ch];

  document.body.appendChild(ban);
  setTimeout(()=>{ban.style.animation='bannerOut .4s ease-in forwards';setTimeout(()=>ban.remove(),400)},1200);
}

function showResolveFloat(p,text,tone){
  const td=document.getElementById(`t${p.row}-${p.col}`);if(!td)return;
  const brd=document.getElementById('brd');
  const tRect=td.getBoundingClientRect();
  const bRect=brd.getBoundingClientRect();
  const fl=document.createElement('div');
  fl.className=`resolve-float ${tone}`;
  fl.textContent=text;
  fl.style.left=(tRect.left-bRect.left+tRect.width/2)+'px';
  fl.style.top=(tRect.top-bRect.top-5)+'px';
  fl.style.transform='translateX(-50%)';
  brd.appendChild(fl);
  setTimeout(()=>fl.remove(),1500);
}

async function startTurn(){
  const p=cp();
  // Auto-skip if player lost their turn
  if(p.lostTurn){
    p.lostTurn=false;
    document.getElementById('trnI').textContent=`${p.name}'s Turn (${CHARS[p.ch].name})`;
    log(`${p.name} lost their turn!`,'damage');
    showTurnBanner(p);
    await new Promise(r=>setTimeout(r,1200));
    endTurn();
    return;
  }
  G.phase='rolling';G.dice=null;G.moves=[];
  const myTurn=isMyTurn();
  document.getElementById('rollBtn').disabled=!myTurn;document.getElementById('endBtn').disabled=true;
  document.getElementById('trnI').textContent=`${p.name}'s Turn (${CHARS[p.ch].name})`;
  renderDice();renderSB();renderBoard();
  log(`${p.name}'s turn`,'info');
  showTurnBanner(p);
  broadcastState('startTurn');
  // Offer rope at start of turn
  if(myTurn&&hasItem(p,'utilityRope')&&getRopeTargets(p).length){
    await useRope(p,'start of turn');
  }
}

function showMo(id){document.getElementById(id).classList.add('active')}
function closeMo(id){document.getElementById(id).classList.remove('active');if(id==='shopMo')finishRes()}
function showChoice(title,text,opts){
  // In multiplayer host mode: if the choice is for a remote player, send it to them
  if(MP.mode==='host'&&G.started){
    const activePlayer=G.cpi;
    const conn=MP.conns.find(c=>c._mpIdx===activePlayer);
    if(conn){
      // This choice is for a remote player — send prompt and wait for response
      // Also broadcast to other players as read-only view
      MP.conns.forEach(c=>{
        if(c._mpIdx===activePlayer){
          c.send({type:'promptChoice',title,msg:text,options:opts});
        } else {
          c.send({type:'showPopup',popupType:'log',msg:`⏳ Waiting for ${G.players[activePlayer].name} to choose: ${title}`,tone:'info'});
        }
      });
      return new Promise(resolve=>{MP.choiceResolve=resolve});
    }
  }
  // Local mode or host's own turn — show locally
  return new Promise(resolve=>{
    document.getElementById('evT').textContent=title;
    document.getElementById('evR').innerHTML=`<div class="rt">${text}</div>`;
    const c=document.getElementById('evC');c.innerHTML='';
    opts.forEach(o=>{const b=document.createElement('button');b.className='cbtn';b.textContent=o;b.onclick=()=>{document.getElementById('evMo').classList.remove('active');resolve(o)};c.appendChild(b)});
    showMo('evMo');
  });
}
function showWin(p){document.getElementById('winN').textContent=`${p.name} (${CHARS[p.ch].name}) wins!`;document.getElementById('winS').textContent=`${getPts(p)} pts in ${G.round} rounds`;document.getElementById('win').classList.add('active')}
function findType(type){const r=[];G.board.forEach(row=>row.forEach(t=>{if(t.type===type)r.push(t)}));return r}

// Highlight tiles of a type and let user pick one; returns {row,col} or null
function pickTileOfType(type,msg,filterFn){
  let tiles=findType(type);
  if(filterFn)tiles=tiles.filter(filterFn);
  if(!tiles.length)return Promise.resolve(null);

  // If remote player, send tile pick to them
  const isRemote=MP.mode==='host'&&MP.conns.some(c=>c._mpIdx===G.cpi);
  if(isRemote){
    return remotePickTile(tiles,msg||'Click a highlighted tile',false,null).then(choice=>{
      if(choice)return tiles.find(t=>t.row===choice.row&&t.col===choice.col)||null;
      return null;
    });
  }

  return new Promise(resolve=>{
    log(msg||`Click a highlighted tile to teleport`,'info');
    const handlers=[];
    tiles.forEach(t=>{
      const td=document.getElementById(`t${t.row}-${t.col}`);
      if(!td)return;
      td.classList.add('leap-target');
      const h=()=>resolve(t);
      td.addEventListener('click',h,{once:true});
      handlers.push({el:td,fn:h});
    });
    window._pickH=handlers;
  }).then(choice=>{
    document.querySelectorAll('.leap-target').forEach(t=>t.classList.remove('leap-target'));
    if(window._pickH){window._pickH.forEach(h=>{try{h.el.removeEventListener('click',h.fn)}catch(e){}});window._pickH=null}
    return choice;
  });
}
function updateUI(){renderSB();document.getElementById('rndI').textContent=`Round ${G.round}`;document.getElementById('trnI').textContent=`${cp().name}'s Turn (${CHARS[cp().ch].name})`}
</script>
