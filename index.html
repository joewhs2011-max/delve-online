<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gilacon - Delve Online</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--gold:#e6a817;--gold2:#f5d060;--red:#e74c3c;--green:#2ecc71;--blue:#3498db;--purple:#9b59b6;--orange:#e67e22;--cyan:#00d2ff;--txt:#ecf0f1;--dim:#95a5a6;--ts:48px}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;height:100vh;user-select:none}

/* ── MODE SELECT ── */
#modeSelect{position:fixed;inset:0;background:url('Tile Icons/Background.png') center/cover fixed;background-color:#0d1117;z-index:1001;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#modeSelect h1{font-family:'Press Start 2P',monospace;font-size:32px;color:var(--gold);text-shadow:0 0 20px rgba(230,168,23,.5)}
.mode-btn{padding:14px 40px;font-family:'Press Start 2P',monospace;font-size:12px;border:2px solid var(--gold);background:rgba(10,10,26,.85);color:var(--gold);border-radius:8px;cursor:pointer;min-width:260px;transition:all .2s}
.mode-btn:hover{background:var(--gold);color:var(--bg)}
#joinPanel,#hostPanel{display:none;flex-direction:column;align-items:center;gap:12px;margin-top:8px}
#joinPanel.show,#hostPanel.show{display:flex}
.room-input{padding:10px 16px;font-family:'Press Start 2P',monospace;font-size:18px;text-align:center;width:180px;letter-spacing:8px;border:2px solid var(--gold);background:rgba(10,10,26,.9);color:var(--gold);border-radius:6px;text-transform:uppercase}
.lobby-players{background:rgba(10,10,26,.85);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:12px 20px;min-width:300px;max-width:400px}
.lobby-player{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:13px}
.lobby-player:last-child{border-bottom:none}
.lobby-status{font-size:11px;color:var(--dim)}
.room-code-display{font-family:'Press Start 2P',monospace;font-size:28px;color:var(--gold);letter-spacing:10px;background:rgba(10,10,26,.85);padding:12px 24px;border-radius:8px;border:2px dashed var(--gold)}
.char-pick-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.char-pick-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 14px;border:2px solid rgba(255,255,255,.2);border-radius:8px;background:rgba(10,10,26,.85);color:var(--txt);cursor:pointer;transition:all .2s;min-width:80px}
.char-pick-btn:hover{border-color:var(--gold);background:rgba(26,26,46,.95)}
.char-pick-btn.sel{border-color:var(--gold);background:rgba(230,168,23,.35);box-shadow:0 0 12px rgba(230,168,23,.3)}
.char-pick-btn.taken{opacity:.25;pointer-events:none}
.char-pick-btn .cp-name{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gold)}
.char-pick-btn .cp-icon{font-size:24px}
.char-card-preview{margin-top:8px;text-align:center}
.char-card-preview img{max-height:300px;border-radius:8px;border:2px solid var(--gold);box-shadow:0 0 20px rgba(230,168,23,.3)}

/* ── CHAR SELECT ── */
#charSelect{position:fixed;inset:0;background:url('Tile Icons/Background.png') center/cover fixed;background-color:#0d1117;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#charSelect h1{font-family:'Press Start 2P',monospace;font-size:32px;color:var(--gold);text-shadow:0 0 20px rgba(230,168,23,.5)}
.cs-sub{color:var(--dim);font-size:16px}
.pc-row{display:flex;gap:8px}
.pc-btn{width:44px;height:44px;border:2px solid var(--gold);background:rgba(10,10,26,.9);color:var(--gold);font-family:'Press Start 2P',monospace;font-size:14px;border-radius:6px;cursor:pointer}
.pc-btn:hover,.pc-btn.sel{background:var(--gold);color:var(--bg)}
#setupArea{display:flex;flex-direction:column;gap:10px;width:100%;max-width:700px;padding:0 20px}
.pr{display:flex;align-items:center;gap:8px}
.pr label{width:80px;font-size:13px;color:var(--gold)}
.pr input{flex:1;padding:6px 10px;border:1px solid rgba(255,255,255,.2);border-radius:4px;background:rgba(10,10,26,.9);color:var(--txt);font-size:14px}
.cp{display:flex;gap:4px}
.cpb{width:32px;height:32px;border:2px solid rgba(255,255,255,.2);border-radius:4px;background:rgba(10,10,26,.9);font-size:16px;cursor:pointer}
.cpb:hover{border-color:var(--gold)}.cpb.sel{border-color:var(--gold);background:rgba(230,168,23,.3)}.cpb.taken{opacity:.2;pointer-events:none}
#startBtn{padding:12px 32px;font-family:'Press Start 2P',monospace;font-size:12px;background:var(--gold);color:var(--bg);border:none;border-radius:6px;cursor:pointer;margin-top:8px}
#startBtn:disabled{opacity:.3;cursor:not-allowed}

/* ── GAME LAYOUT ── */
#game{display:none;height:100vh;grid-template-columns:1fr 300px;grid-template-rows:42px 1fr;grid-template-areas:"hd hd" "bd sb"}
#game.active{display:grid}

#hd{grid-area:hd;background:linear-gradient(90deg,var(--bg2),var(--bg3));display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:2px solid var(--gold)}
#hd h1{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--gold)}
.hi{font-size:12px;color:var(--dim)}

#bc{grid-area:bd;overflow:auto;padding:10px;background:url('Tile Icons/Background.png') center/cover fixed;background-color:#0d1117}
#brd{display:grid;column-gap:2px;row-gap:12px;margin:0 auto;width:fit-content;position:relative}

/* ── TILES ── */
/* ── TILES ── */
.tl{width:var(--ts);height:var(--ts);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:bold;position:relative;transition:all .15s;cursor:default;border:none;background:transparent;background-size:contain;background-position:center;background-repeat:no-repeat;overflow:visible}
.tl:not(.empty):not(.start):not(.finish){background-image:url('Tile Icons/Tile file shape.png')}
.tl.hex:not(.empty){background-image:url('Tile Icons/Hexagon Tile Shape.png')}
.tl.empty{background:transparent!important;border:none!important;pointer-events:none}
.ti{font-size:15px;line-height:1;z-index:2}.tv{font-size:9px;margin-top:1px;z-index:2;color:#fff;text-shadow:0 0 3px #000,0 0 3px #000}.tlab{font-size:6px;opacity:.8;z-index:2;color:#fff;text-shadow:0 0 2px #000}

/* Tile that uses a full-art PNG (icon baked into shape) — overrides the default shape bg */
.tl.full-art{background-size:contain;background-position:center;background-repeat:no-repeat}
/* Shop tiles rendered slightly larger */
.tl.shop.full-art{background-size:120%;background-position:center}
/* full-art already sets bg via inline style, no additional shape needed */

/* Tile icon images — overlaid on shape */
.tile-img{image-rendering:pixelated;z-index:2;pointer-events:none;object-fit:contain}
.tile-img.icon-sm{width:24px;height:24px}
.tile-img.icon-md{width:70%;height:70%;object-fit:contain}
.tile-img.icon-lg{width:80%;height:80%;object-fit:contain}

/* Claimed treasures/jewels */
.tl.treasure.claimed{opacity:.35}
.tl.jewel.claimed{opacity:.35}

/* Portal tiles — no colored borders, the portal art PNGs distinguish them */
.tl.portal{border:none}

/* Start & Finish panoramic tiles */
.tl.start-span{background-image:url('Tile Icons/Start Tile.png')!important;background-size:cover;background-position:center;grid-column:span 2;width:auto;overflow:visible;border-radius:8px}
.tl.finish-span{background-image:url('Tile Icons/Finish Tile.png')!important;background-size:cover;background-position:center;grid-column:span 4;width:auto;overflow:visible;border-radius:8px}

/* Ladder indicators on tiles */
.ladder-up,.ladder-down{position:absolute;font-size:7px;color:rgba(255,255,255,.5);z-index:3}
.ladder-up{top:1px;right:1px}.ladder-down{bottom:1px;right:1px}

/* Ladder visuals between rows */
.ladder-connector{position:absolute;z-index:6;pointer-events:none}
.ladder-connector .ladder-rung{
  position:absolute;left:0;right:0;height:2px;background:#c0c0c0;border-radius:1px;
}

/* Movement highlights */
/* Tile-type-specific move highlights */
.tl[data-hl]{cursor:pointer;position:relative;z-index:5}
.tl[data-hl]::after{content:'';position:absolute;inset:-4px;border-radius:inherit;pointer-events:none}
/* Green (default) */
.tl[data-hl="green"]{box-shadow:0 0 12px 4px rgba(0,255,0,.7),inset 0 0 8px rgba(0,255,0,.3);border:3px solid #0f0!important;animation:hlGreen 1s infinite}
.tl[data-hl="green"]::after{border:2px solid rgba(0,255,0,.5)}
/* Blue (mystery box) */
.tl[data-hl="blue"]{box-shadow:0 0 12px 4px rgba(0,120,255,.7),inset 0 0 8px rgba(0,120,255,.3);border:3px solid #08f!important;animation:hlBlue 1s infinite}
.tl[data-hl="blue"]::after{border:2px solid rgba(0,120,255,.5)}
/* Orange (bonfire) */
.tl[data-hl="orange"]{box-shadow:0 0 12px 4px rgba(255,140,0,.7),inset 0 0 8px rgba(255,140,0,.3);border:3px solid #ff8c00!important;animation:hlOrange 1s infinite}
.tl[data-hl="orange"]::after{border:2px solid rgba(255,140,0,.5)}
/* Brown (shop) */
.tl[data-hl="brown"]{box-shadow:0 0 12px 4px rgba(160,82,45,.7),inset 0 0 8px rgba(160,82,45,.3);border:3px solid #a0522d!important;animation:hlBrown 1s infinite}
.tl[data-hl="brown"]::after{border:2px solid rgba(160,82,45,.5)}
/* Gold (treasure/jewel) */
.tl[data-hl="gold"]{box-shadow:0 0 12px 4px rgba(255,215,0,.7),inset 0 0 8px rgba(255,215,0,.3);border:3px solid #ffd700!important;animation:hlGold 1s infinite}
.tl[data-hl="gold"]::after{border:2px solid rgba(255,215,0,.5)}
/* Red (trap) */
.tl[data-hl="red"]{box-shadow:0 0 12px 4px rgba(255,50,50,.7),inset 0 0 8px rgba(255,50,50,.3);border:3px solid #f33!important;animation:hlRed 1s infinite}
.tl[data-hl="red"]::after{border:2px solid rgba(255,50,50,.5)}
/* Purple (portal) */
.tl[data-hl="purple"]{box-shadow:0 0 12px 4px rgba(160,32,240,.7),inset 0 0 8px rgba(160,32,240,.3);border:3px solid #a020f0!important;animation:hlPurple 1s infinite}
.tl[data-hl="purple"]::after{border:2px solid rgba(160,32,240,.5)}
/* Cyan (hex early stop) */
.tl[data-hl="cyan"]{box-shadow:0 0 12px 4px rgba(0,210,255,.7),inset 0 0 8px rgba(0,210,255,.3);border:3px solid #00d2ff!important;animation:hlCyan 1s infinite}
.tl[data-hl="cyan"]::after{border:2px solid rgba(0,210,255,.5)}
/* Teleport selection highlight */
.tl.leap-target{box-shadow:0 0 14px 5px rgba(255,165,0,.85),inset 0 0 10px rgba(255,165,0,.3);border:3px solid #ff8c00!important;cursor:pointer;animation:hlOrange 1s infinite;position:relative;z-index:5}
.tl.leap-target::after{content:'';position:absolute;inset:-4px;border-radius:inherit;border:2px solid rgba(255,165,0,.6);pointer-events:none}
.tl.leap-skip{box-shadow:0 0 10px 3px rgba(150,150,150,.6),inset 0 0 6px rgba(150,150,150,.2);border:3px solid #999!important;cursor:pointer;animation:pulse 1s infinite;position:relative;z-index:5}
.tl.leap-skip::after{content:'SKIP';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);font-size:6px;font-weight:bold;color:#999;font-family:'Press Start 2P',monospace;z-index:5}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes hlGreen{0%,100%{box-shadow:0 0 12px 4px rgba(0,255,0,.7),inset 0 0 8px rgba(0,255,0,.3)}50%{box-shadow:0 0 18px 8px rgba(0,255,0,.9),inset 0 0 12px rgba(0,255,0,.5)}}
@keyframes hlBlue{0%,100%{box-shadow:0 0 12px 4px rgba(0,120,255,.7),inset 0 0 8px rgba(0,120,255,.3)}50%{box-shadow:0 0 18px 8px rgba(0,120,255,.9),inset 0 0 12px rgba(0,120,255,.5)}}
@keyframes hlOrange{0%,100%{box-shadow:0 0 12px 4px rgba(255,140,0,.7),inset 0 0 8px rgba(255,140,0,.3)}50%{box-shadow:0 0 18px 8px rgba(255,140,0,.9),inset 0 0 12px rgba(255,140,0,.5)}}
@keyframes hlBrown{0%,100%{box-shadow:0 0 12px 4px rgba(160,82,45,.7),inset 0 0 8px rgba(160,82,45,.3)}50%{box-shadow:0 0 18px 8px rgba(160,82,45,.9),inset 0 0 12px rgba(160,82,45,.5)}}
@keyframes hlGold{0%,100%{box-shadow:0 0 12px 4px rgba(255,215,0,.7),inset 0 0 8px rgba(255,215,0,.3)}50%{box-shadow:0 0 18px 8px rgba(255,215,0,.9),inset 0 0 12px rgba(255,215,0,.5)}}
@keyframes hlRed{0%,100%{box-shadow:0 0 12px 4px rgba(255,50,50,.7),inset 0 0 8px rgba(255,50,50,.3)}50%{box-shadow:0 0 18px 8px rgba(255,50,50,.9),inset 0 0 12px rgba(255,50,50,.5)}}
@keyframes hlPurple{0%,100%{box-shadow:0 0 12px 4px rgba(160,32,240,.7),inset 0 0 8px rgba(160,32,240,.3)}50%{box-shadow:0 0 18px 8px rgba(160,32,240,.9),inset 0 0 12px rgba(160,32,240,.5)}}
@keyframes hlCyan{0%,100%{box-shadow:0 0 12px 4px rgba(0,210,255,.7),inset 0 0 8px rgba(0,210,255,.3)}50%{box-shadow:0 0 18px 8px rgba(0,210,255,.9),inset 0 0 12px rgba(0,210,255,.5)}}

/* Player tokens */
/* 3D figurine player tokens */
.ptk{position:absolute;width:36px;height:50px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;z-index:20;transition:all .3s;filter:drop-shadow(2px 4px 3px rgba(0,0,0,.6));transform:translateY(-10px)}
.ptk .ptk-figure{width:32px;height:38px;border-radius:6px 6px 3px 3px;display:flex;align-items:center;justify-content:center;font-size:18px;position:relative;border:2px solid rgba(255,255,255,.7);
  background:linear-gradient(135deg,rgba(255,255,255,.35) 0%,transparent 50%,rgba(0,0,0,.25) 100%);
  box-shadow:inset 0 2px 4px rgba(255,255,255,.5),inset 0 -3px 5px rgba(0,0,0,.35),0 3px 6px rgba(0,0,0,.5)}
.ptk .ptk-base{width:28px;height:7px;border-radius:0 0 5px 5px;margin-top:-1px;
  background:linear-gradient(to bottom,rgba(0,0,0,.15),rgba(0,0,0,.35));
  box-shadow:0 4px 8px rgba(0,0,0,.6),0 2px 3px rgba(0,0,0,.4)}
.ptk.active{animation:tokenPulse 1.2s infinite;z-index:25}
.ptk.active .ptk-figure{box-shadow:inset 0 2px 4px rgba(255,255,255,.5),inset 0 -3px 5px rgba(0,0,0,.35),0 0 14px 5px rgba(255,255,255,.85),0 0 24px 8px rgba(255,215,0,.5)}
.ptk.active .ptk-base{box-shadow:0 4px 12px rgba(255,215,0,.6),0 0 10px rgba(255,255,255,.5)}
.ptk .ptk-name{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:7px;font-family:'Press Start 2P',monospace;color:#fff;text-shadow:0 0 3px #000,0 0 3px #000;white-space:nowrap;pointer-events:none;background:rgba(0,0,0,.7);padding:2px 4px;border-radius:3px;opacity:0;transition:opacity .2s}
.ptk:hover .ptk-name{opacity:1}
.ptk:hover .ptk-figure,.ptk:hover .ptk-base{opacity:.25}
.ptk.active .ptk-name{opacity:1}
@keyframes tokenPulse{0%,100%{box-shadow:0 0 10px 3px rgba(255,255,255,.9)}50%{box-shadow:0 0 18px 6px rgba(255,255,255,.5)}}
.tp0{top:-4px;left:-4px}.tp1{top:-4px;right:-4px}.tp2{bottom:-4px;left:-4px}.tp3{bottom:-4px;right:-4px}.tp4{top:50%;left:50%;transform:translate(-50%,-50%)}

/* Zone separator lines */
.zone-line{position:absolute;left:0;right:0;height:6px;z-index:5;pointer-events:none;border-radius:2px;display:flex;align-items:center;justify-content:center}
.zone-line-label{position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'Press Start 2P',monospace;font-size:6px;padding:2px 8px;border-radius:3px;z-index:6;pointer-events:none;color:#fff;font-weight:bold;top:50%;transform:translate(-50%,-50%)}
.zone-orange{background:#e67e22}
.zone-yellow{background:#f1c40f}
.zone-red{background:#e74c3c}
.zone-line-vert{position:absolute;width:6px;z-index:5;pointer-events:none;border-radius:2px;display:flex;align-items:center;justify-content:center}
.zone-line-vert .zone-line-label{left:50%;top:50%;transform:translate(-50%,-50%) rotate(90deg);white-space:nowrap}

/* ── SIDEBAR ── */
#sb{grid-area:sb;background:var(--bg2);border-left:2px solid rgba(255,255,255,.1);overflow-y:auto;padding:8px;font-size:12px}
.cpc{background:rgba(255,255,255,.05);border-radius:8px;padding:10px;margin-bottom:8px;border:2px solid var(--gold)}
.cpc h2{font-size:14px;color:var(--gold);margin-bottom:6px}
.sr{display:flex;justify-content:space-between;padding:2px 0;font-size:12px}
.sl{color:var(--dim)}.sv{font-weight:bold}
.sv.hr{color:var(--red)}.sv.cn{color:var(--gold)}.sv.tp{color:var(--green)}.sv.lv{color:var(--cyan)}
.il{margin-top:4px;padding:4px;background:rgba(0,0,0,.2);border-radius:4px;font-size:10px}
.il h4{color:var(--gold);margin-bottom:2px;font-size:10px}
.itag{display:inline-block;padding:1px 4px;margin:1px;background:rgba(255,255,255,.1);border-radius:3px;font-size:9px}
.opm{background:rgba(255,255,255,.03);border-radius:6px;padding:6px;margin-bottom:4px;border:1px solid rgba(255,255,255,.06);font-size:11px}
.opm .nm{font-weight:bold;margin-bottom:2px}
.ms{display:flex;gap:8px;font-size:10px;color:var(--dim)}

/* ── CONTROLS (in sidebar) ── */
#controls{background:rgba(0,0,0,.2);border-radius:8px;padding:10px;margin-bottom:8px;border:1px solid rgba(255,255,255,.1)}
#controls h3{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--dim);margin-bottom:8px;text-align:center}
#da{display:flex;flex-direction:column;align-items:center;gap:6px}
.dd{display:flex;gap:8px;justify-content:center}
.die{width:48px;height:48px;background:#fff;color:#000;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:20px;box-shadow:2px 2px 4px rgba(0,0,0,.5)}
.die.rolling{animation:dr .1s infinite}
@keyframes dr{0%{transform:rotate(0) scale(1)}25%{transform:rotate(10deg) scale(1.1)}50%{transform:rotate(-5deg) scale(.95)}75%{transform:rotate(8deg) scale(1.05)}100%{transform:rotate(0) scale(1)}}
.btn-row{display:flex;gap:6px;width:100%}
.abtn{flex:1;padding:10px 8px;font-family:'Press Start 2P',monospace;font-size:9px;border:none;border-radius:4px;cursor:pointer}
#rollBtn{background:var(--green);color:#000}
#rollBtn:disabled{opacity:.3;cursor:not-allowed}
#endBtn{background:var(--orange);color:#000}
#endBtn:disabled{opacity:.3;cursor:not-allowed}
#gl{background:rgba(0,0,0,.3);border-radius:6px;padding:6px;overflow-y:auto;font-size:11px;line-height:1.5;max-height:160px;margin-top:8px}
.le{padding:1px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.le.reward{color:var(--gold)}.le.damage{color:var(--red)}.le.info{color:var(--cyan)}.le.level{color:#7fff00}

/* ── MODALS ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:500}
.mo.active{display:flex}
.md{background:var(--bg2);border:2px solid var(--gold);border-radius:10px;padding:16px;max-width:580px;width:90%;max-height:80vh;overflow-y:auto}
.md h2{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--gold);margin-bottom:12px;text-align:center}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.si{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:8px;text-align:center;cursor:pointer;transition:all .2s}
.si:hover{border-color:var(--gold);background:rgba(230,168,23,.1)}
.si.no{opacity:.3;cursor:not-allowed}
.si .sic{font-size:24px}.si .sin{font-size:11px;font-weight:bold;color:var(--gold);margin:3px 0}.si .sip{font-size:10px;color:var(--gold)}.si .sid{font-size:9px;color:var(--dim);margin-top:3px}
.rd{text-align:center;padding:16px}.rd .ri{font-size:40px;margin-bottom:8px}.rd .rt{font-size:14px;margin-bottom:8px}.rd .rdl{font-size:12px;color:var(--dim)}
.cb{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.cbtn{padding:8px 16px;font-size:13px;border:2px solid var(--gold);background:rgba(230,168,23,.2);color:var(--gold);border-radius:4px;cursor:pointer}
.cbtn:hover{background:var(--gold);color:var(--bg)}

/* ── EVENT ROLL POPUP ── */
.roll-popup{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:550;flex-direction:column}
.roll-popup.active{display:flex}
.roll-box{background:var(--bg2);border:3px solid var(--gold);border-radius:16px;padding:24px 32px;text-align:center;min-width:340px;max-width:480px;animation:rollPopIn .3s ease-out}
@keyframes rollPopIn{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
.roll-box.mystery{border-color:var(--cyan);box-shadow:0 0 40px rgba(0,210,255,.3)}
.roll-box.super{border-color:var(--gold2);box-shadow:0 0 40px rgba(245,208,96,.3)}
.roll-box.trap{border-color:var(--red);box-shadow:0 0 40px rgba(231,76,60,.3)}
.roll-title{font-family:'Press Start 2P',monospace;font-size:14px;margin-bottom:16px}
.roll-title.mystery{color:var(--cyan)}.roll-title.super{color:var(--gold2)}.roll-title.trap{color:var(--red)}
.roll-dice-row{display:flex;gap:12px;justify-content:center;margin:16px 0}
.roll-die{width:56px;height:56px;background:#fff;color:#000;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:22px;box-shadow:3px 3px 8px rgba(0,0,0,.5);transition:transform .2s}
.roll-die.rolling{animation:dr .1s infinite}
.roll-die.landed{transform:scale(1.15);box-shadow:0 0 12px rgba(255,255,255,.4)}
.roll-total{font-family:'Press Start 2P',monospace;font-size:18px;color:var(--gold);margin:8px 0}
.roll-outcome{font-size:16px;margin:12px 0;padding:12px;background:rgba(0,0,0,.3);border-radius:8px;line-height:1.5}
.roll-outcome.good{color:var(--gold);border:1px solid rgba(230,168,23,.3)}
.roll-outcome.bad{color:var(--red);border:1px solid rgba(231,76,60,.3)}
.roll-outcome.neutral{color:var(--txt);border:1px solid rgba(255,255,255,.15)}
.roll-icon{font-size:36px;margin-bottom:6px}
.roll-continue{margin-top:16px}

#win{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:600;flex-direction:column;gap:16px}
#win.active{display:flex}
#win h1{font-family:'Press Start 2P',monospace;font-size:24px;color:var(--gold);text-shadow:0 0 20px rgba(230,168,23,.8)}

/* Turn banner overlay */
.turn-banner{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:400;pointer-events:none;animation:bannerIn .4s ease-out}
.turn-banner-inner{font-family:'Press Start 2P',monospace;font-size:22px;padding:18px 48px;border-radius:12px;background:rgba(0,0,0,.85);border:3px solid;text-align:center;animation:bannerPop .4s ease-out}
.turn-banner-icon{font-size:36px;margin-bottom:8px}
@keyframes bannerIn{0%{opacity:0}100%{opacity:1}}
@keyframes bannerPop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes bannerOut{0%{opacity:1}100%{opacity:0}}

/* Board dice overlay */
.board-dice-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;display:flex;gap:10px;pointer-events:none;animation:dicePopIn .2s ease-out}
.board-dice-overlay .die{width:60px;height:60px;font-size:24px;box-shadow:0 0 20px rgba(255,255,255,.4)}
@keyframes dicePopIn{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
@keyframes diceFlyOut{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.3) translateY(-40px)}}

/* Resolution float popup */
.resolve-float{position:absolute;z-index:25;pointer-events:none;font-family:'Press Start 2P',monospace;font-size:11px;font-weight:bold;text-shadow:0 0 4px #000,0 0 4px #000;animation:floatUp 1.4s ease-out forwards;white-space:nowrap}
.resolve-float.reward{color:var(--gold)}.resolve-float.damage{color:var(--red)}.resolve-float.level{color:#7fff00}.resolve-float.info{color:var(--cyan)}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}60%{opacity:1}100%{opacity:0;transform:translateY(-40px)}}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px}
</style>
</head>
<body>

<div id="modeSelect">
  <h1>GILACON</h1>
  <div class="cs-sub">Delve Online</div>
  <div style="margin-top:20px;display:flex;flex-direction:column;gap:12px;align-items:center">
    <button class="mode-btn" onclick="selectMode('local')">⚔️ LOCAL GAME</button>
    <button class="mode-btn" onclick="selectMode('host')">🌐 CREATE ROOM</button>
    <button class="mode-btn" onclick="selectMode('join')">🔗 JOIN ROOM</button>
  </div>
  <div id="hostPanel">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
      <span style="color:var(--dim);font-size:11px">Room code:</span>
      <input type="text" class="room-input" id="customCode" maxlength="4" placeholder="AUTO" style="width:120px;font-size:14px;letter-spacing:6px" oninput="this.value=this.value.toUpperCase()">
      <span style="color:var(--dim);font-size:9px">(leave blank for random)</span>
    </div>
    <div style="color:var(--dim);font-size:12px">Share this code with other players:</div>
    <div class="room-code-display" id="roomCodeDisplay">----</div>
    <div class="lobby-status" id="hostStatus">Connecting...</div>
    <div class="lobby-players" id="hostLobby"></div>
    <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
      <span style="color:var(--dim);font-size:11px">Your name:</span>
      <input type="text" id="hostName" placeholder="Name" style="padding:6px 10px;border:1px solid rgba(255,255,255,.2);border-radius:4px;background:rgba(10,10,26,.9);color:var(--txt);font-size:13px;width:120px">
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center" id="hostCharPick"></div>
    <button class="mode-btn" id="hostStartBtn" onclick="hostStartGame()" disabled>START GAME</button>
  </div>
  <div id="joinPanel">
    <div style="color:var(--dim);font-size:12px">Enter room code:</div>
    <input type="text" class="room-input" id="roomCodeInput" maxlength="4" placeholder="CODE" oninput="this.value=this.value.toUpperCase()">
    <div style="display:flex;gap:8px;align-items:center">
      <span style="color:var(--dim);font-size:11px">Your name:</span>
      <input type="text" id="joinName" placeholder="Name" style="padding:6px 10px;border:1px solid rgba(255,255,255,.2);border-radius:4px;background:rgba(10,10,26,.9);color:var(--txt);font-size:13px;width:120px">
    </div>
    <button class="mode-btn" id="joinBtn" onclick="joinRoom()">JOIN</button>
    <div class="lobby-status" id="joinStatus"></div>
    <div class="lobby-players" id="joinLobby" style="display:none"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center" id="joinCharPick"></div>
  </div>
</div>

<div id="charSelect">
  <h1>GILACON</h1>
  <div class="cs-sub">Delve Online</div>
  <div style="color:var(--dim);font-size:13px;margin-top:8px">Number of Players:</div>
  <div class="pc-row" id="pcRow"></div>
  <div id="setupArea"></div>
  <button id="startBtn" disabled>START DELVE</button>
</div>

<div id="game">
  <div id="hd"><h1>GILACON</h1><div class="hi" id="rndI">Round 1</div><div class="hi" id="trnI">Turn</div></div>
  <div id="bc"><div id="brd"></div></div>
  <div id="sb">
    <div id="controls">
      <h3>CONTROLS</h3>
      <div id="da">
        <div class="dd" id="diceD"></div>
        <div class="btn-row">
          <button class="abtn" id="rollBtn" onclick="rollDice()">ROLL</button>
          <button class="abtn" id="endBtn" onclick="endTurn()" disabled>END TURN</button>

<div class="mo" id="shopMo"><div class="md"><h2>DELVE SHOP</h2><div class="sg" id="shopG"></div><div style="text-align:center;margin-top:12px"><button class="cbtn" onclick="closeMo('shopMo')">Close Shop</button></div></div></div>
<div class="mo" id="evMo"><div class="md"><h2 id="evT">EVENT</h2><div class="rd" id="evR"></div><div class="cb" id="evC"></div></div></div>
<div class="roll-popup" id="rollPopup"><div class="roll-box" id="rollBox"><div class="roll-title" id="rollTitle">MYSTERY BOX</div><div class="roll-icon" id="rollIcon">❓</div><div class="roll-dice-row" id="rollDiceRow"></div><div class="roll-total" id="rollTotal"></div><div class="roll-outcome" id="rollOutcome"></div><div class="roll-continue"><button class="cbtn" id="rollContinueBtn">Continue</button></div></div></div>
<div id="win"><h1>VICTORY!</h1><div id="winN" style="font-size:20px"></div><div id="winS" style="font-size:14px;color:var(--gold)"></div><button class="cbtn" onclick="location.reload()">Play Again</button></div>

<script>
// ═══════════ MULTIPLAYER ═══════════
let MP={mode:'local',peer:null,conns:[],hostConn:null,roomCode:'',myIndex:-1,playerSlots:[],choiceResolve:null};

function selectMode(m){
  if(m==='local'){
    document.getElementById('modeSelect').style.display='none';
    document.getElementById('charSelect').style.display='flex';
    MP.mode='local';return;
  }
  if(m==='host'){
    document.getElementById('hostPanel').classList.add('show');
    document.getElementById('joinPanel').classList.remove('show');
    createRoom();
  }
  if(m==='join'){
    document.getElementById('joinPanel').classList.add('show');
    document.getElementById('hostPanel').classList.remove('show');
  }
}

function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<4;i++)r+=c[Math.floor(Math.random()*c.length)];return r}

function renderCharPicker(containerId,selectedCh,takenChars,onPick){
  const el=document.getElementById(containerId);if(!el)return;
  const chars=['barbarian','knight','ranger','speedster','wizard'];
  const IP='Tile Icons/Character Cards/';
  const names={barbarian:'Barbarian',knight:'Knight',ranger:'Ranger',speedster:'Speedster',wizard:'Wizard'};
  let html='<div class="char-pick-row">';
  html+=chars.map(ch=>{
    const taken=takenChars.includes(ch)&&ch!==selectedCh;
    const sel=ch===selectedCh;
    return `<button class="char-pick-btn${sel?' sel':''}${taken?' taken':''}" onclick="pickMPChar('${containerId}','${ch}')" onmouseenter="previewChar('${containerId}','${ch}')">`
      +`<span class="cp-icon">${CHARS[ch]?.ic||''}</span>`
      +`<span class="cp-name">${names[ch]}</span>`
      +`</button>`;
  }).join('');
  html+='</div>';
  html+=`<div class="char-card-preview" id="${containerId}_preview">`;
  if(selectedCh)html+=`<img src="${IP}${names[selectedCh]}.png" alt="${names[selectedCh]}">`;
  html+='</div>';
  el.innerHTML=html;
}

function previewChar(containerId,ch){
  const names={barbarian:'Barbarian',knight:'Knight',ranger:'Ranger',speedster:'Speedster',wizard:'Wizard'};
  const prev=document.getElementById(containerId+'_preview');
  if(prev)prev.innerHTML=`<img src="Tile Icons/Character Cards/${names[ch]}.png" alt="${names[ch]}">`;
}

function pickMPChar(containerId,ch){
  if(MP.mode==='host'){
    MP.playerSlots[0].ch=ch;MP.playerSlots[0].ready=true;
    renderCharPicker('hostCharPick',ch,MP.playerSlots.filter(s=>s.ch).map(s=>s.ch));
    broadcastLobby();checkHostReady();
  } else if(MP.mode==='client'){
    MP.hostConn.send({type:'ready',ch});
    renderCharPicker('joinCharPick',ch,[]);
  }
}

// ── HOST ──
function createRoom(){
  MP.mode='host';
  const custom=document.getElementById('customCode').value.trim().toUpperCase();
  MP.roomCode=custom.length===4?custom:genCode();
  document.getElementById('roomCodeDisplay').textContent=MP.roomCode;
  document.getElementById('hostStatus').textContent='Connecting to relay...';
  MP.peer=new Peer('delve-'+MP.roomCode,{debug:0});
  MP.peer.on('open',id=>{
    document.getElementById('hostStatus').textContent='Room open! Waiting for players...';
    MP.playerSlots=[{name:document.getElementById('hostName').value||'Host',ch:null,ready:false,isHost:true}];
    renderHostLobby();
    renderCharPicker('hostCharPick',null,[]);
  });
  MP.peer.on('connection',conn=>{
    conn.on('open',()=>{
      conn.on('data',data=>handleHostMsg(conn,data));
      conn.on('close',()=>handleDisconnect(conn));
      conn.on('error',()=>handleDisconnect(conn));
    });
    MP.conns.push(conn);
  });
  MP.peer.on('error',err=>{
    if(err.type==='unavailable-id'){MP.roomCode=genCode();document.getElementById('roomCodeDisplay').textContent=MP.roomCode;createRoom()}
    else document.getElementById('hostStatus').textContent='Error: '+err.type;
  });
}

function handleDisconnect(conn){
  const idx=conn._mpIdx;
  if(idx===undefined)return;
  const slot=MP.playerSlots[idx];
  if(slot){
    slot.connected=false;
    slot.conn=null;
    log(`⚠️ ${slot.name} disconnected!`,'damage');
    // Remove dead connection
    MP.conns=MP.conns.filter(c=>c!==conn);
    if(G.started){
      // If it was their turn, auto-skip
      if(G.cpi===idx){
        log(`${slot.name} disconnected on their turn — skipping`,'damage');
        setTimeout(()=>{if(G.cpi===idx)endTurn()},1500);
      }
      broadcastState('playerDisconnect');
    } else {
      broadcastLobby();renderHostLobby();
    }
  }
}

function handleHostMsg(conn,data){
  if(data.type==='join'){
    // Check for reconnection — find a disconnected slot with same name
    const reconIdx=MP.playerSlots.findIndex(s=>s.name===data.name&&!s.connected&&!s.isHost);
    if(reconIdx>=0){
      // Reconnect to existing slot
      const slot=MP.playerSlots[reconIdx];
      slot.conn=conn;slot.connected=true;
      conn._mpIdx=reconIdx;
      MP.conns.push(conn);
      log(`✅ ${data.name} reconnected!`,'level');
      conn.send({type:'assignIndex',index:reconIdx,slots:MP.playerSlots.map(s=>({name:s.name,ch:s.ch,ready:s.ready}))});
      if(G.started){
        // Send full game state to reconnected player
        conn.send({type:'stateUpdate',state:serializeG(),event:'reconnect'});
      }
      broadcastLobby();renderHostLobby();
      return;
    }
    // New player
    const idx=MP.playerSlots.length;
    MP.playerSlots.push({name:data.name,ch:null,ready:false,isHost:false,conn,connected:true});
    conn._mpIdx=idx;
    conn.send({type:'assignIndex',index:idx,slots:MP.playerSlots.map(s=>({name:s.name,ch:s.ch,ready:s.ready}))});
    broadcastLobby();renderHostLobby();checkHostReady();
  }
  if(data.type==='ready'){
    const s=MP.playerSlots.find(s=>s.conn===conn);
    if(s){s.ch=data.ch;s.ready=true;broadcastLobby();renderHostLobby();checkHostReady()}
  }
  if(data.type==='action'&&G.started){
    const pi=conn._mpIdx;
    if(pi!==G.cpi)return; // not their turn
    if(data.action==='roll')rollDice();
    else if(data.action==='move')onTileClick(data.row,data.col);
    else if(data.action==='endTurn')endTurn();
  }
  if(data.type==='choiceResponse'&&MP.choiceResolve){
    MP.choiceResolve(data.value);MP.choiceResolve=null;
  }
}

function broadcastLobby(){
  const slots=MP.playerSlots.map(s=>({name:s.name,ch:s.ch,ready:s.ready}));
  MP.conns.forEach(c=>{try{c.send({type:'lobbyUpdate',slots})}catch(e){}});
}

function renderHostLobby(){
  const el=document.getElementById('hostLobby');
  el.innerHTML=MP.playerSlots.map((s,i)=>`<div class="lobby-player"><span>${s.isHost?'👑 ':''}${s.name}</span><span style="color:${s.ready?'#2ecc71':'#e74c3c'}">${s.ch?CHARS[s.ch]?.name||s.ch:'Choosing...'}</span></div>`).join('');
}

function checkHostReady(){
  const btn=document.getElementById('hostStartBtn');
  btn.disabled=!(MP.playerSlots.length>=2&&MP.playerSlots.every(s=>s.ready));
}

function hostStartGame(){
  // Update host name
  MP.playerSlots[0].name=document.getElementById('hostName').value||'Host';
  MP.myIndex=0;
  // Set up game with multiplayer players
  nPlayers=MP.playerSlots.length;
  setups=MP.playerSlots.map((s,i)=>({name:s.name,ch:s.ch}));
  document.getElementById('modeSelect').style.display='none';
  startGame();
  // Broadcast game start with full state
  broadcastState('gameStart');
}

function broadcastState(event){
  if(MP.mode!=='host')return;
  const state=serializeG();
  MP.conns.forEach(c=>{try{c.send({type:'stateUpdate',state,event})}catch(e){}});
}

function broadcastPopup(popupType,data){
  if(MP.mode!=='host')return;
  MP.conns.forEach(c=>{try{c.send({type:'showPopup',popupType,...data})}catch(e){}});
}

// Send a tile-pick prompt to the remote active player
function remotePickTile(tiles,msg,allowSkip,skipTile){
  const activeIdx=G.cpi;
  const conn=MP.conns.find(c=>c._mpIdx===activeIdx);
  if(!conn)return Promise.resolve(null);
  conn.send({type:'showPopup',popupType:'pickTile',tiles:tiles.map(t=>({row:t.row,col:t.col})),msg,allowSkip,skipTile});
  return new Promise(resolve=>{MP.choiceResolve=resolve});
}

function serializeG(){
  return {
    round:G.round,cpi:G.cpi,phase:G.phase,dice:G.dice,dv:G.dv,over:G.over,started:G.started,
    moves:G.moves.map(m=>({row:m.row,col:m.col})),
    players:G.players.map(p=>({
      i:p.i,name:p.name,ch:p.ch,row:p.row,col:p.col,hp:p.hp,mhp:p.mhp,coins:p.coins,lv:p.lv,
      treasures:p.treasures,jewels:p.jewels,cursed:p.cursed,items:[...p.items],
      extraLife:p.extraLife,bfProt:p.bfProt,lostTurn:p.lostTurn,movMod:p.movMod,
      bullseye:p.bullseye,_extra:p._extra,_enteredViaDoor:p._enteredViaDoor
    })),
    board:G.board.map(row=>row.map(t=>({available:t.available})))
  };
}

function deserializeG(state){
  G.round=state.round;G.cpi=state.cpi;G.phase=state.phase;G.dice=state.dice;G.dv=state.dv;G.over=state.over;G.started=state.started;
  G.moves=state.moves||[];
  state.players.forEach((sp,i)=>{
    const p=G.players[i];if(!p)return;
    Object.assign(p,{row:sp.row,col:sp.col,hp:sp.hp,mhp:sp.mhp,coins:sp.coins,lv:sp.lv,
      treasures:sp.treasures,jewels:sp.jewels,cursed:sp.cursed,items:sp.items,
      extraLife:sp.extraLife,bfProt:sp.bfProt,lostTurn:sp.lostTurn,movMod:sp.movMod,
      bullseye:sp.bullseye,_extra:sp._extra,_enteredViaDoor:sp._enteredViaDoor});
  });
  state.board.forEach((row,r)=>row.forEach((t,c)=>{if(G.board[r]&&G.board[r][c])G.board[r][c].available=t.available}));
  // Re-render everything
  renderBoard();renderTokens();renderSB();renderDice();
  document.getElementById('rndI').textContent=`Round ${G.round}`;
  const cp=G.players[G.cpi];
  document.getElementById('trnI').textContent=`${cp?.name||''}'s Turn`;
  // Enable/disable controls based on whose turn it is
  const myTurn=MP.myIndex===G.cpi;
  document.getElementById('rollBtn').disabled=!(myTurn&&G.phase==='rolling');
  document.getElementById('endBtn').disabled=!(myTurn&&G.phase==='endTurn');
  if(G.phase==='moving'&&myTurn)hlMoves();
}

// ── CLIENT ──
function joinRoom(){
  const code=document.getElementById('roomCodeInput').value.trim().toUpperCase();
  const name=document.getElementById('joinName').value||'Player';
  if(code.length!==4){document.getElementById('joinStatus').textContent='Enter a 4-character code';return}
  MP.mode='client';MP.roomCode=code;
  document.getElementById('joinStatus').textContent='Connecting...';
  document.getElementById('joinBtn').disabled=true;
  MP.peer=new Peer(undefined,{debug:0});
  MP.peer.on('open',()=>{
    const conn=MP.peer.connect('delve-'+code,{reliable:true});
    MP.hostConn=conn;
    conn.on('open',()=>{
      document.getElementById('joinStatus').textContent='Connected! Pick your character:';
      conn.send({type:'join',name});
    });
    conn.on('data',data=>handleClientMsg(data));
    conn.on('error',err=>{document.getElementById('joinStatus').textContent='Connection error: '+err});
    conn.on('close',()=>{
      if(G.started){
        // Show reconnect overlay during game
        const ov=document.createElement('div');ov.id='reconOverlay';
        ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:"Press Start 2P",monospace';
        ov.innerHTML=`<div style="font-size:16px;color:#e74c3c">⚠️ DISCONNECTED</div>
          <div style="font-size:10px;color:var(--dim)">Lost connection to host</div>
          <button onclick="reconnectToHost()" style="padding:10px 24px;background:var(--gold);color:var(--bg);border:none;border-radius:6px;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:10px">🔄 RECONNECT</button>`;
        document.body.appendChild(ov);
      } else {
        document.getElementById('joinStatus').textContent='Disconnected from host';
      }
    });
  });
  MP.peer.on('error',err=>{
    document.getElementById('joinStatus').textContent='Error: '+err.type;
    document.getElementById('joinBtn').disabled=false;
  });
}

function handleClientMsg(data){
  if(data.type==='assignIndex'){
    MP.myIndex=data.index;
    renderJoinLobby(data.slots);
    renderCharPicker('joinCharPick',null,data.slots.filter(s=>s.ch).map(s=>s.ch));
  }
  if(data.type==='lobbyUpdate'){
    renderJoinLobby(data.slots);
    const taken=data.slots.filter(s=>s.ch).map(s=>s.ch);
    const myCh=data.slots[MP.myIndex]?.ch||null;
    renderCharPicker('joinCharPick',myCh,taken);
  }
  if(data.type==='stateUpdate'){
    if(data.event==='gameStart'){
      // Initialize game locally
      nPlayers=data.state.players.length;
      setups=data.state.players.map(p=>({name:p.name,ch:p.ch}));
      document.getElementById('modeSelect').style.display='none';
      startGame();
    }
    deserializeG(data.state);
  }
  if(data.type==='promptChoice'){
    // Show choice UI and send response back
    showChoice(data.title,data.msg,data.options).then(val=>{
      MP.hostConn.send({type:'choiceResponse',value:val});
    });
  }
  if(data.type==='showPopup'){
    if(data.popupType==='rollPopup'){
      showRollPopup(data.rollType,data.numDice,data.diceVals,data.total,data.outcome);
    }
    if(data.popupType==='turnRecap'){
      showTurnRecapData(data.recap);
    }
    if(data.popupType==='turnBanner'){
      const p=G.players[data.cpi];if(p){sfxTurnStart(p.ch);showTurnBanner(p)}
    }
    if(data.popupType==='diceRoll'){
      // Show dice animation on client's board
      const brd=document.getElementById('brd');if(brd){
        const ov=document.createElement('div');ov.className='board-dice-overlay';
        for(let i=0;i<data.numDice;i++){const bd=document.createElement('div');bd.className='die rolling';bd.textContent='?';ov.appendChild(bd)}
        brd.appendChild(ov);
        const anim=setInterval(()=>{ov.querySelectorAll('.die').forEach(d=>{d.textContent=Math.floor(Math.random()*6)+1})},80);
        setTimeout(()=>{clearInterval(anim);const dies=ov.querySelectorAll('.die');dies.forEach((d,i)=>{d.classList.remove('rolling');d.textContent=data.vals[i]||'?'});
          setTimeout(()=>{ov.style.animation='diceFlyOut .4s ease-in forwards';setTimeout(()=>ov.remove(),400)},600)},700);
      }
    }
    if(data.popupType==='sfx'){
      if(data.sfx==='turnEnd')sfxTurnEnd();
      if(data.sfx==='death')sfxDeath();
      if(data.sfx==='superMystery')sfxSuperMystery();
      if(data.sfx==='lowHealth')sfxLowHealth(data.name||'');
    }
    if(data.popupType==='log'){
      log(data.msg,data.tone||'info');
    }
    if(data.popupType==='pickTile'){
      // Show tile targets for this player to click
      log(data.msg||'Click a highlighted tile','info');
      document.querySelectorAll('.leap-target,.leap-skip').forEach(t=>t.classList.remove('leap-target','leap-skip'));
      const handlers=[];
      data.tiles.forEach(t=>{
        const td=document.getElementById(`t${t.row}-${t.col}`);if(!td)return;
        td.classList.add('leap-target');
        const h=()=>{
          document.querySelectorAll('.leap-target,.leap-skip').forEach(el=>el.classList.remove('leap-target','leap-skip'));
          handlers.forEach(hh=>{try{hh.el.removeEventListener('click',hh.fn)}catch(e){}});
          MP.hostConn.send({type:'choiceResponse',value:{row:t.row,col:t.col}});
        };
        td.addEventListener('click',h,{once:true});handlers.push({el:td,fn:h});
      });
      if(data.allowSkip&&data.skipTile){
        const skipTd=document.getElementById(`t${data.skipTile.row}-${data.skipTile.col}`);
        if(skipTd){skipTd.classList.add('leap-skip');
          const h=()=>{
            document.querySelectorAll('.leap-target,.leap-skip').forEach(el=>el.classList.remove('leap-target','leap-skip'));
            handlers.forEach(hh=>{try{hh.el.removeEventListener('click',hh.fn)}catch(e){}});
            MP.hostConn.send({type:'choiceResponse',value:null});
          };
          skipTd.addEventListener('click',h,{once:true});handlers.push({el:skipTd,fn:h});
        }
      }
    }
  }
}

function reconnectToHost(){
  const name=MP.playerSlots?.[MP.myIndex]?.name||document.getElementById('joinName').value||'Player';
  const code=MP.roomCode;
  if(MP.peer)try{MP.peer.destroy()}catch(e){}
  MP.peer=new Peer(undefined,{debug:0});
  MP.peer.on('open',()=>{
    const conn=MP.peer.connect('delve-'+code,{reliable:true});
    MP.hostConn=conn;
    conn.on('open',()=>{
      conn.send({type:'join',name});
      const ov=document.getElementById('reconOverlay');if(ov)ov.remove();
    });
    conn.on('data',data=>handleClientMsg(data));
    conn.on('close',()=>{
      const ov=document.createElement('div');ov.id='reconOverlay';
      ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:"Press Start 2P",monospace';
      ov.innerHTML=`<div style="font-size:16px;color:#e74c3c">⚠️ DISCONNECTED</div><div style="font-size:10px;color:var(--dim)">Could not reconnect</div><button onclick="reconnectToHost()" style="padding:10px 24px;background:var(--gold);color:var(--bg);border:none;border-radius:6px;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:10px">🔄 RETRY</button>`;
      document.body.appendChild(ov);
    });
  });
}

let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}

function playNote(freq,dur,type='square',vol=0.15,delay=0){
  const ctx=getAudio(),t=ctx.currentTime+delay;
  const osc=ctx.createOscillator(),gain=ctx.createGain();
  osc.type=type;osc.frequency.setValueAtTime(freq,t);
  gain.gain.setValueAtTime(vol,t);gain.gain.exponentialRampToValueAtTime(0.001,t+dur);
  osc.connect(gain);gain.connect(ctx.destination);
  osc.start(t);osc.stop(t+dur);
}

// Speech synthesis helper
function speak(text){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.9;u.pitch=0.7;u.volume=0.8;
  // Try to get a deep/dramatic voice
  const voices=speechSynthesis.getVoices();
  const deep=voices.find(v=>v.name.includes('Daniel')||v.name.includes('Alex')||v.name.includes('Google UK English Male'));
  if(deep)u.voice=deep;
  speechSynthesis.speak(u);
}

// Compact: "type:value:shape" → parsed by T()
// shape: h=hex, r=rect(default). _ = empty
function T(s){
  if(s==='_')return{type:'empty',shape:'rect',value:0,extra:null,available:true};
  const p=s.split(':');
  const type=p[0],val=p[1]||'',shape=p[2]==='h'?'hex':'rect';
  let v=0,extra=null;
  if(['c','h','ch'].includes(type))v=parseInt(val)||0;
  if(type==='t')v=parseInt(val)||0;
  if(type==='p')extra=val; // portal color
  if(type==='pt')extra=val; // character
  if(type==='a')extra=val; // direction
  const typeMap={c:'coin',h:'heart',ch:'coinHeart',t:'treasure',p:'portal',mb:'mysteryBox',sm:'superMysteryBox',
    tr:'trap',sh:'shop',bf:'bonfire',wb:'web',lu:'levelUp',j:'jewel',cj:'cursedJewel',
    st:'start',fn:'finish',dd:'dungeonDoor',pt:'playerTile',a:'arrow',lt:'loseTurn'};
  return{type:typeMap[type]||type,shape,value:v,extra,available:true};
}

    h+=`<div class="pr"><label>Player ${i+1}:</label><input placeholder="Name..." value="${setups[i].name}" onchange="setups[${i}].name=this.value;chkReady()"><div class="cp">`;
    for(const k of playable){
      const c=CHARS[k],t=taken.includes(k)&&setups[i].ch!==k,s=setups[i].ch===k;
      h+=`<button class="cpb ${s?'sel':''} ${t?'taken':''}" title="${c.name}" onclick="setups[${i}].ch='${k}';renderSetup()">${c.icon}</button>`;
    }
    h+=`</div></div>`;
  }
  a.innerHTML=h;chkReady();
}

function chkReady(){
  const ok=setups.every(s=>s.name.trim()&&s.ch)&&new Set(setups.map(s=>s.ch)).size===setups.filter(s=>s.ch).length;
  document.getElementById('startBtn').disabled=!ok;
}

document.getElementById('startBtn').onclick=startGame;

// ═══════════ INIT GAME ═══════════
function fitBoard(){
  // Calculate optimal tile size so the board fills the available viewport
  const sidebarW=300,headerH=42,padX=30,padY=20,cols=30,rows=12,colGap=2,rowGap=12,labelW=18,labelH=16;
  const availW=window.innerWidth-sidebarW-padX-labelW;
  const availH=window.innerHeight-headerH-padY-labelH;
  const tsW=Math.floor((availW-(cols-1)*colGap)/cols);
  const tsH=Math.floor((availH-(rows-1)*rowGap)/rows);
  const ts=Math.max(28,Math.min(tsW,tsH,72));
  document.documentElement.style.setProperty('--ts',ts+'px');
}
window.addEventListener('resize',()=>{if(G.started){fitBoard();renderBoard()}});

function startGame(){
  stopTheme();
  fitBoard();
  // Build board
  G.board=BD.map((row,r)=>row.map((s,c)=>{const t=T(s);t.row=r;t.col=c;t.zone=getZone(r);t.doorVisited=false;return t}));

  // Build ladder lookup for fast adjacency
  buildLadderMap();

  // Mark forced-stop trap tiles (these block movement like webs)
  const FORCED_TRAPS=[[8,12],[9,18],[9,23],[10,16]];
  FORCED_TRAPS.forEach(([r,c])=>{if(G.board[r]&&G.board[r][c])G.board[r][c].forcedStop=true});

  // Start position: C5 R0 (0-indexed col 5, row 0)
  let sr=0,sc=5;

  G.players=setups.map((s,i)=>{
    const c=CHARS[s.ch];
    return{i,name:s.name,ch:s.ch,cd:c,row:sr,col:sc,hp:c.hp,mhp:c.hp,coins:0,lv:0,tp:0,
      treasures:[],jewels:0,cursed:0,items:[],extraLife:false,bfProt:false,lostTurn:false,
      movMod:0,usedPT:false,lastBoom:null,bullseye:null,nitro:false,portal:false,illusion:false,
      trapsHit:[],startTile:null,tGain:0,jGain:0,_extra:false,_dblVal:false};
  });

  G.round=1;G.cpi=0;G.phase='rolling';G.started=true;
  document.getElementById('charSelect').style.display='none';
  document.getElementById('game').classList.add('active');
  renderBoard();renderSB();renderDice();updateUI();
  log('The delve begins! Round 1','info');
  log(`${cp().name}'s turn (${CHARS[cp().ch].name})`,'info');
  showTurnBanner(cp());
}

// ═══════════ LADDER MAP ═══════════
let ladderMap={};
function buildLadderMap(){
  ladderMap={};
  for(const[[r1,c1],[r2,c2]]of LADDERS){
    const k1=`${r1},${c1}`,k2=`${r2},${c2}`;
    if(!ladderMap[k1])ladderMap[k1]=[];
    if(!ladderMap[k2])ladderMap[k2]=[];
    ladderMap[k1].push([r2,c2]);
    ladderMap[k2].push([r1,c1]);
  }
}

// ═══════════ SPRITE HELPERS ═══════════
// The heartgold spritesheet has 10 frames in a row:
// 0=+1coin, 1=+2coin, 2=+3coin, 3=+4coin, 4=+5coin, 5=+1heart, 6=+2heart, 7=+3heart, 8=+1h+1c
// Each frame is ~1/10 of width. We use a clipping wrapper.
function tileImg(src,value,totalFrames,kind){
  let frame=0;
  if(kind==='coin'){frame=Math.min(Math.max(value,1),5)-1} // 0-4 for +1 to +5 coin
  else if(kind==='heart'){
    if(value<0)return `<span class="ti" style="color:var(--red)">💔</span>`; // negative hearts use emoji
    frame=4+Math.min(Math.max(value,1),3); // 5-7 for +1 to +3 heart
  }
  else if(kind==='ch'){frame=9} // coin+heart combo is last frame
  const pct=(frame/totalFrames)*100;
  const wPct=totalFrames*100;
  return `<div style="width:24px;height:24px;overflow:hidden;z-index:2"><img src="${src}" style="height:24px;width:${wPct}%;margin-left:-${frame*24}px;image-rendering:pixelated"></div>`;
}

// Portal spritesheet: 6 portals L-R: gold, blue, green, purple, white, pink
function portalImg(src,color){
  const colorMap={gold:0,blue:1,green:2,purple:3,white:4,pink:5,red:5,black:4}; // red→pink sprite, black→white sprite tinted
  const frame=colorMap[color]??0;
  return `<div style="width:24px;height:24px;overflow:hidden;z-index:2"><img src="${src}" style="height:24px;width:600%;margin-left:-${frame*24}px;image-rendering:pixelated"></div>`;
}

const PORTAL_ART={

function renderBoard(){
  const b=document.getElementById('brd');
  const rows=G.board.length,cols=G.board[0].length;
  b.style.gridTemplateColumns=`18px repeat(${cols},var(--ts))`;
  b.style.gridTemplateRows=`16px repeat(${rows},var(--ts))`;
  b.innerHTML='';

  // Column headers (top row)
  const corner=document.createElement('div');
  corner.style.cssText='font-size:7px;color:#888;display:flex;align-items:center;justify-content:center';
  b.appendChild(corner);
  for(let c=0;c<cols;c++){
    const ch=document.createElement('div');
    ch.style.cssText='font-size:7px;color:#888;display:flex;align-items:center;justify-content:center;font-family:"Press Start 2P",monospace';
    ch.textContent=c;
    b.appendChild(ch);
  }

  // Track start/finish spans to skip subsequent cells
  const skipCells=new Set();

  // Pre-scan for start/finish groups
  for(let r=0;r<rows;r++){
    let c=0;
    while(c<cols){
      const t=G.board[r][c];
      if(t.type==='start'||t.type==='finish'){
        let span=1;
        while(c+span<cols&&G.board[r][c+span].type===t.type)span++;
        for(let s=1;s<span;s++)skipCells.add(`${r},${c+s}`);
        // Store span info on first cell
        t._span=span;
      }
      c++;
    }
  }

  const IP='Tile Icons/';

  for(let r=0;r<rows;r++){
    // Row label
    const rl=document.createElement('div');
    rl.style.cssText='font-size:7px;color:#888;display:flex;align-items:center;justify-content:center;font-family:"Press Start 2P",monospace';
    rl.textContent=r;
    b.appendChild(rl);

    for(let c=0;c<cols;c++){
      if(skipCells.has(`${r},${c}`))continue; // spanned by start/finish group

      const t=G.board[r][c];
      const d=document.createElement('div');
      d.id=`t${r}-${c}`;d.dataset.row=r;d.dataset.col=c;

      let cls=['tl',t.shape==='hex'?'hex':''];
      cls.push(t.type);
      if(t.type==='portal')cls.push(`portal-${t.extra}`);
      if((t.type==='treasure'||t.type==='jewel')&&!t.available)cls.push('claimed');

      let iconHtml='',val='',lab='';

      switch(t.type){
        case'coin':{
          // Check for full-art PNG
          const fa=FULL_ART[`coin:${t.value}`];
          if(fa){d.style.backgroundImage=`url('${fa}')`;cls.push('full-art')}
          else{iconHtml=tileImg(IP+'spr_tile_09_heartgold_inc[x4].png',t.value,10,'coin')}
          break;
        }
        case'heart':{
          const fa=FULL_ART[`heart:${Math.abs(t.value)}`];
          if(fa&&t.value>0){d.style.backgroundImage=`url('${fa}')`;cls.push('full-art')}
          else{iconHtml=tileImg(IP+'spr_tile_09_heartgold_inc[x4].png',t.value,10,'heart')}
          break;
        }
        case'coinHeart':{
          d.style.backgroundImage=`url('${FULL_ART.coinHeart}')`;cls.push('full-art');break;
        }
        case'treasure':{
          d.style.backgroundImage=`url('${IP}Treasure Chest.png')`;cls.push('full-art');
          val=t.value;if(!t.available)lab='TAKEN';break;
        }
        case'mysteryBox':{
          d.style.backgroundImage=`url('${IP}Mystery Box Tile.png')`;cls.push('full-art');break;
        }
        case'superMysteryBox':{
          d.style.backgroundImage=`url('${IP}Super Mystery Box Tile.png')`;cls.push('full-art');break;
        }
        case'trap':{
          if(t.shape==='hex'){
            d.style.backgroundImage=`url('${IP}Trap Tile Hexagon.png')`;cls.push('full-art');
          } else {
            d.style.backgroundImage=`url('${IP}Trap Tile.png')`;cls.push('full-art');
          }
          break;
        }
        case'shop':{
          d.style.backgroundImage=`url('${IP}Shop.png')`;cls.push('full-art');break;
        }
        case'bonfire':{
          d.style.backgroundImage=`url('${IP}Bonfire.png')`;cls.push('full-art');break;
        }
        case'levelUp':{
          iconHtml=`<img class="tile-img icon-sm" src="${IP}spr_tile_05_levelup[x4].png">`;break;
        }
        case'portal':{
          const pa=PORTAL_ART[t.extra];
          if(pa){d.style.backgroundImage=`url('${pa}')`;cls.push('full-art')}
          else{iconHtml=portalImg(IP+'spr_tile_08_portal[x4].png',t.extra)}
          break;
        }
        case'web':{
          d.style.backgroundImage=`url('${IP}Web.png')`;cls.push('full-art');break;
        }
        case'jewel':{
          iconHtml=`<img class="tile-img icon-md" src="${IP}Gold Jewel.png">`;
          if(!t.available)lab='TAKEN';break;
        }
        case'cursedJewel':{
          iconHtml=`<img class="tile-img icon-md" src="${IP}Cursed Jewel.png">`;break;
        }
        case'start':{
          cls.push('start-span');
          // Remove default shape bg — panoramic image is set via CSS class
          break;
        }
        case'finish':{
          cls.push('finish-span');
          break;
        }
        case'dungeonDoor':{
          iconHtml=`<span class="ti">🚪</span>`;lab='DOOR';break;
        }
        case'playerTile':{
          const pa=PLAYER_ART[t.extra];
          if(pa){d.style.backgroundImage=`url('${pa}')`;cls.push('full-art')}
          else{iconHtml=`<span class="ti">${CHARS[t.extra]?.icon||'👤'}</span>`}
          lab=CHARS[t.extra]?.name||'';break;
        }
        case'arrow':{
          iconHtml=`<span class="ti">${{u:'⬆️',d:'⬇️',l:'⬅️',r:'➡️'}[t.extra]||'➡️'}</span>`;break;
        }
        case'loseTurn':{
          iconHtml=`<span class="ti">⛔</span>`;lab='LOSE TURN';break;
        }
      }

      d.className=cls.filter(Boolean).join(' ');
      d.innerHTML=`${iconHtml}${val?`<span class="tv">${val}</span>`:''}${lab?`<span class="tlab">${lab}</span>`:''}`;
      // Bullseye marker for ranger
      if(t.type==='treasure'&&t.available&&G.players){
        const marker=G.players.find(p=>p.ch==='ranger'&&p.bullseye&&p.bullseye.r===r&&p.bullseye.c===c);
        if(marker)d.innerHTML+=`<div style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:red;border:2px solid #fff;border-radius:50%;z-index:10;display:flex;align-items:center;justify-content:center;font-size:8px">🎯</div>`;
      }
      d.onclick=()=>onTileClick(r,c);
      b.appendChild(d);
    }
  }
  // Add hidden placeholder elements for spanned cells (needed for ID lookups)
  for(const k of skipCells){
    const[r,c]=k.split(',').map(Number);
    const ph=document.createElement('div');
    ph.id=`t${r}-${c}`;ph.dataset.row=r;ph.dataset.col=c;
    ph.style.cssText='position:absolute;width:0;height:0;overflow:hidden;pointer-events:none';
    // Forward clicks to the span-parent cell
    const firstCol=G.board[r][c].type==='start'?5:25;
    ph.onclick=()=>onTileClick(r,firstCol);
    b.appendChild(ph);
  }
  renderTokens();
  requestAnimationFrame(()=>{renderLadders();renderZoneLines()});
}

function renderLadders(){
  document.querySelectorAll('.ladder-connector').forEach(l=>l.remove());
  const brd=document.getElementById('brd');
  const brdRect=brd.getBoundingClientRect();
  const lw=10; // ladder width

  for(const[[r1,c1],[r2,c2]]of LADDERS){
    const topR=Math.min(r1,r2),topC=r1<r2?c1:c2;
    const botR=Math.max(r1,r2),botC=r1<r2?c2:c1;
    const topTile=document.getElementById(`t${topR}-${topC}`);
    const botTile=document.getElementById(`t${botR}-${botC}`);
    if(!topTile||!botTile)continue;

    const topRect=topTile.getBoundingClientRect();
    const botRect=botTile.getBoundingClientRect();

    // Ladder touches bottom edge of top tile to top edge of bottom tile
    // For spanning tiles (start/finish), use the bottom tile's x center instead
    const topIsSpan=topTile.classList.contains('start-span')||topTile.classList.contains('finish-span');
    const botIsSpan=botTile.classList.contains('start-span')||botTile.classList.contains('finish-span');
    const x=topIsSpan?((botRect.left+botRect.right)/2)-brdRect.left
           :botIsSpan?((topRect.left+topRect.right)/2)-brdRect.left
           :((topRect.left+topRect.right)/2)-brdRect.left;
    const y1=topRect.bottom-brdRect.top;
    const y2=botRect.top-brdRect.top;
    const h=y2-y1;
    if(h<=0)continue;

    const conn=document.createElement('div');
    conn.className='ladder-connector';
    conn.style.cssText=`left:${x-lw/2}px;top:${y1}px;width:${lw}px;height:${h}px`;

    // Light grey rails
    let inner=`<div style="position:absolute;left:0;top:0;bottom:0;width:2px;background:#b0b0b0;border-radius:1px"></div>`;
    inner+=`<div style="position:absolute;right:0;top:0;bottom:0;width:2px;background:#b0b0b0;border-radius:1px"></div>`;
    // Exactly 3 rungs, evenly spaced
    for(let i=1;i<=3;i++){
      const ry=Math.round((i/4)*h);
      inner+=`<div class="ladder-rung" style="top:${ry}px"></div>`;
    }
    conn.innerHTML=inner;
    brd.appendChild(conn);
  }
}

function renderZoneLines(){
  document.querySelectorAll('.zone-line').forEach(l=>l.remove());
  const brd=document.getElementById('brd');
  const brdRect=brd.getBoundingClientRect();

  // Helper: get right edge of col 24 (last col before final zone)
  const col24Tile=document.getElementById('t2-24')||document.getElementById('t3-24');
  const mainRightX=col24Tile?(col24Tile.getBoundingClientRect().right-brdRect.left):brdRect.width;

  // Helper: get left edge of col 25 (final zone start)
  const col25Tile=document.getElementById('t0-25');
  const fzLeftX=col25Tile?(col25Tile.getBoundingClientRect().left-brdRect.left):mainRightX;

  // Helper: get right edge of last col
  const lastColTile=document.getElementById('t0-29')||document.getElementById('t1-29');
  const fullRightX=lastColTile?(lastColTile.getBoundingClientRect().right-brdRect.left):brdRect.width;

  // Orange line between row 8 and row 9 — stops before final zone
  const row8Tile=document.getElementById('t8-0')||document.getElementById('t8-1');
  const row9Tile=document.getElementById('t9-0')||document.getElementById('t9-1');
  if(row8Tile&&row9Tile){
    const r8=row8Tile.getBoundingClientRect();
    const r9=row9Tile.getBoundingClientRect();
    const y=((r8.bottom+r9.top)/2)-brdRect.top;
    const line=document.createElement('div');
    line.className='zone-line zone-orange';
    line.style.cssText=`top:${y-2}px;left:0;right:auto;width:${fullRightX}px`;
    line.innerHTML=`<span class="zone-line-label">NEED 30+ PTS TO ENTER &nbsp;|&nbsp; -2 HEARTS PER TURN</span>`;
    brd.appendChild(line);
  }

  // Red vertical line separating final zone — sits in the gap between col 24 and col 25
  const topLeft=document.getElementById('t0-25');
  const botLeft=document.getElementById('t4-25');
  const col24Top=document.getElementById('t0-24')||document.getElementById('t1-24');
  if(topLeft&&botLeft){
    const tl=topLeft.getBoundingClientRect();
    const bl=botLeft.getBoundingClientRect();
    // Position in the gap: right edge of col24 to left edge of col25
    const c24Right=col24Top?col24Top.getBoundingClientRect().right-brdRect.left:tl.left-brdRect.left-16;
    const c25Left=tl.left-brdRect.left;
    const gapCenter=(c24Right+c25Left)/2;
    const y=tl.top-brdRect.top;
    const h=bl.bottom-tl.top;
    const vline=document.createElement('div');
    vline.className='zone-line-vert zone-red';
    vline.style.cssText=`left:${gapCenter-3}px;top:${y}px;height:${h}px`;
    vline.innerHTML=`<span class="zone-line-label">FINAL ZONE - 175 PTS REQUIRED</span>`;
    brd.appendChild(vline);
  }

  // Red horizontal line from dungeon door row to right edge (below row 4 in final zone)
  const doorTile=document.getElementById('t4-25');
  if(doorTile&&lastColTile){
    const dr=doorTile.getBoundingClientRect();
    const lr=lastColTile.getBoundingClientRect();
    const y=dr.bottom-brdRect.top+2;
    const x=fzLeftX;
    const w=lr.right-brdRect.left-x;
    const line=document.createElement('div');
    line.className='zone-line zone-red';
    line.style.cssText=`top:${y}px;left:${x}px;right:auto;width:${w}px`;
    line.innerHTML=`<span class="zone-line-label">-2 HEARTS PER TURN</span>`;
    brd.appendChild(line);
  }

  // Yellow line between row 1 and row 2 — stops before final zone
  const row1Tile=document.getElementById('t1-0')||document.getElementById('t1-1');
  const row2Tile=document.getElementById('t2-0')||document.getElementById('t2-1');
  if(row1Tile&&row2Tile){
    const r1=row1Tile.getBoundingClientRect();
    const r2=row2Tile.getBoundingClientRect();
    const y=((r1.bottom+r2.top)/2)-brdRect.top;
    const line=document.createElement('div');
    line.className='zone-line zone-yellow';
    line.style.cssText=`top:${y-2}px;left:0;right:auto;width:${mainRightX}px`;
    line.innerHTML=`<span class="zone-line-label">-1 HEART PER TURN BELOW THIS LINE</span>`;
    brd.appendChild(line);
  }
}

function renderTokens(){
  document.querySelectorAll('.ptk').forEach(t=>t.remove());
  const groups={};
  G.players.forEach(p=>{const k=`${p.row}-${p.col}`;if(!groups[k])groups[k]=[];groups[k].push(p)});
  for(const[k,ps]of Object.entries(groups)){
    let td=document.getElementById(`t${k}`);if(!td)continue;
    // If token is on a hidden spanned cell (0 size), redirect to the visible span parent
    if(td.getBoundingClientRect().width===0){
      const[r,c]=k.split('-').map(Number);
      // Start tile: redirect to col 4; Finish tile: redirect to col 25
      if(G.board[r][c].type==='start')td=document.getElementById(`t${r}-4`);
      else if(G.board[r][c].type==='finish')td=document.getElementById(`t${r}-25`);
      if(!td)continue;
    }
    ps.forEach((p,i)=>{
      const tk=document.createElement('div');
      tk.className=`ptk tp${ps.length===1?4:i}${p.i===G.cpi?' active':''}`;
      const ch=CHARS[p.ch];
      tk.innerHTML=`<div class="ptk-figure" style="background-color:${ch.color}">${ch.icon}</div><div class="ptk-base" style="background-color:${ch.color}"></div><span class="ptk-name">${p.name}</span>`;
      tk.title=`${p.name} (${ch.name})`;
      td.appendChild(tk);
    });
  }
}

function updateTile(t){
  const d=document.getElementById(`t${t.row}-${t.col}`);
  if(!d)return;
  if(!t.available){d.classList.add('claimed');let l=d.querySelector('.tlab');if(l)l.textContent='TAKEN';}
  else{d.classList.remove('claimed');let l=d.querySelector('.tlab');if(l)l.textContent='';}
}

// ═══════════ UTILS ═══════════
// Final zone = cols 26-29, rows 0-4 (after dungeon door at col 25)
function isFinalZone(r,c){return r<=4&&c>=26}
function canEnterFinalZone(p){return p._enteredViaDoor&&getPts(p)>=175}
// Deep delve = rows 9-11 (Board Rows 10-12), requires 30+ pts
function isDeepDelve(r){return r>=9}
function canEnterDeepDelve(p){return getPts(p)>=30}

function cp(){return G.players[G.cpi]}
function getCap(p){let c=2;const ch=CHARS[p.ch];if(p.lv>=2&&ch.ab[2]?.xt)c+=ch.ab[2].xt;if(p.items.includes('treasureSack'))c+=2;return c}
function getTreasurePts(p){return p.treasures.reduce((s,t)=>s+t.v,0)}
function getPts(p){return getTreasurePts(p)+p.jewels*10-p.cursed*10}
function hasItem(p,id){return p.items.includes(id)}
function canPortal(p){return(p.ch==='wizard'&&p.lv>=1)||hasItem(p,'teleportCrystal')}
// Torch or Speedster lv2+ can pass through webs
function webImmune(p){return hasItem(p,'torch')||(p.ch==='speedster'&&p.lv>=2)}
function d6(){return Math.floor(Math.random()*6)+1}
function log(m,t=''){const g=document.getElementById('gl'),e=document.createElement('div');e.className=`le ${t}`;e.textContent=m;g.prepend(e);while(g.children.length>80)g.removeChild(g.lastChild);if(MP.mode==='host'&&!m.startsWith('📢'))broadcastPopup('log',{msg:m,tone:t})}

// ═══════════ DICE ═══════════
function renderDice(){const d=document.getElementById('diceD'),p=cp(),n=getND(p);let h='';for(let i=0;i<n;i++){const v=G.dv&&G.dv[i]?G.dv[i]:'?';h+=`<div class="die" id="d${i}">${v}</div>`}if(G.dice)h+=`<div style="font-size:11px;color:var(--gold);margin-top:4px;font-family:'Press Start 2P',monospace">Move: ${G.dice}</div>`;d.innerHTML=h}
function getND(p){
  // Final zone: always 1 die regardless of level
  const t=G.board[p.row]?.[p.col];
  if(t&&t.type==='finish')return 1;
  if(p.row<=4&&p.col>=25)return 1; // near finish area
  // Speedster gets 2 dice at level 1+
  if(p.ch==='speedster'&&p.lv>=1)return 2;
  // ALL characters get 2 dice at level 3
  if(p.lv>=3)return 2;
  return 1;
}

async function rollDice(){
  if(G.phase!=='rolling')return;
  if(MP.mode==='client'){MP.hostConn.send({type:'action',action:'roll'});return}
  const p=cp();
  // lostTurn is now handled in startTurn

  const n=getND(p);const dice=document.querySelectorAll('.die');
  dice.forEach(d=>d.classList.add('rolling'));

  // Show dice rolling on board center
  const brd=document.getElementById('brd');
  const boardOverlay=document.createElement('div');
  boardOverlay.className='board-dice-overlay';
  for(let i=0;i<n;i++){const bd=document.createElement('div');bd.className='die rolling';bd.id=`bd${i}`;bd.textContent='?';boardOverlay.appendChild(bd)}
  brd.appendChild(boardOverlay);
  const boardAnimInterval=setInterval(()=>{for(let i=0;i<n;i++){const bd=document.getElementById(`bd${i}`);if(bd)bd.textContent=d6()}},80);

  await new Promise(r=>setTimeout(r,700));

  const vals=[];for(let i=0;i<n;i++)vals.push(d6());
  dice.forEach((d,i)=>{d.classList.remove('rolling');d.textContent=vals[i]});

  // Land board dice then fly out
  clearInterval(boardAnimInterval);
  boardOverlay.querySelectorAll('.die').forEach((bd,i)=>{bd.classList.remove('rolling');bd.textContent=vals[i]});
  setTimeout(()=>{boardOverlay.style.animation='diceFlyOut .4s ease-in forwards';setTimeout(()=>boardOverlay.remove(),400)},600);

  G.dv=vals;let total=vals.reduce((a,b)=>a+b,0);

  // Broadcast dice animation to all clients
  broadcastPopup('diceRoll',{numDice:n,vals,total});

  const inFinal=isFinalZone(p.row,p.col);
  if(p.ch==='speedster'&&p.lv>=1){const b=inFinal?1:2;total+=b;log(`Two Fast: +${b}`,'info')}
  if(hasItem(p,'speedsterShoes')){
    const b=inFinal?1:2;
    const ch=await showChoice("👟 Speedster's Shoes",`Roll: ${total}. Use shoes for +${b}? (Move ${total} or ${total+b})`,[`Use Shoes (+${b} = ${total+b})`,`Skip (${total})`]);
    if(ch.startsWith('Use')){total+=b;log(`Speedster's Shoes: +${b}`,'info')}
    else log("Speedster's Shoes: skipped",'info');
  }
  if(p.movMod){total+=p.movMod;log(`Movement modifier: ${p.movMod}`,'info');p.movMod=0}

  total=Math.max(1,total);G.dice=total;

  p.startTile={row:p.row,col:p.col};
  p._turnHP=p.hp;p._turnCoins=p.coins;p._turnJewels=p.jewels;p._turnTreasures=p.treasures.length;p._turnLv=p.lv;
  p.portal=false;p.illusion=false;p.trapsHit=[];p.tGain=0;p.jGain=0;p.nitro=false;

  log(`${p.name} rolled ${vals.join('+')}${total!==vals.reduce((a,b)=>a+b,0)?' = '+total:''} (move ${total})`,'info');

  calcMoves(p,total);
  G.phase='moving';
  document.getElementById('rollBtn').disabled=true;
  hlMoves();
  broadcastState('rolled');
}

// ═══════════ MOVEMENT (BFS) ═══════════
function getAdj(r,c,player){
  const adj=[],rows=G.board.length,cols=G.board[0].length;
  // Horizontal — normal adjacency (non-empty neighbor)
  if(c>0&&G.board[r][c-1].type!=='empty')adj.push([r,c-1]);
  if(c<cols-1&&G.board[r][c+1].type!=='empty')adj.push([r,c+1]);

  // Ranger Precision (level 1+): jump across horizontal gaps on same row
  if(player&&player.ch==='ranger'&&player.lv>=1){
    // Scan right across gaps
    for(let nc=c+1;nc<cols;nc++){
      if(G.board[r][nc].type!=='empty'){
        if(nc>c+1&&!adj.some(a=>a[0]===r&&a[1]===nc)){
          // Cannot gap-jump into final zone or restricted zones
          if(!isFinalZone(r,nc)){adj.push([r,nc]);player._gapJumped=true}
        }
        break;
      }
    }
    // Scan left across gaps
    for(let nc=c-1;nc>=0;nc--){
      if(G.board[r][nc].type!=='empty'){
        if(nc<c-1&&!adj.some(a=>a[0]===r&&a[1]===nc)){
          if(!isFinalZone(r,nc)){adj.push([r,nc]);player._gapJumped=true}
        }
        break;
      }
    }
  }

  // Ranger Out of Box (level 3): wrap col 29→col 0 on rows 5-11 (0-indexed = rows 6-12 in 1-indexed)
  if(player&&player.ch==='ranger'&&player.lv>=3&&r>=5&&r<=11){
    if(c===29&&G.board[r][0].type!=='empty'&&!adj.some(a=>a[0]===r&&a[1]===0)){
      adj.push([r,0]);
    }
    if(c===0&&G.board[r][29].type!=='empty'&&!adj.some(a=>a[0]===r&&a[1]===29)){
      adj.push([r,29]);
    }
  }

  // Ladders
  const lk=`${r},${c}`;
  if(ladderMap[lk])for(const[lr,lc]of ladderMap[lk])adj.push([lr,lc]);
  // Utility rope removed from adjacency — now a start/end-of-turn action
  return adj;
}

function calcMoves(player,steps){
  const moves=[];const vis=new Set();
  const q=[[player.row,player.col,steps,[]]];
  vis.add(`${player.row},${player.col},${steps}`);

  while(q.length){
    const[r,c,rem,path]=q.shift();

    if(rem===0){
      const t=G.board[r][c];
      if(t.type==='dungeonDoor'&&getPts(player)<175)continue; // need 175+ pts for dungeon door
      if(t.type!=='empty')moves.push({row:r,col:c,path:[...path,[r,c]],door:t.type==='dungeonDoor'});
      continue;
    }

    // Hex optional stop (if moved at least 1) — dungeon door requires 175+ pts
    if(rem<steps&&rem>0){
      const t=G.board[r][c];
      if(t.shape==='hex'&&t.type!=='empty'){
        if(t.type==='dungeonDoor'){
          if(getPts(player)>=175)moves.push({row:r,col:c,path:[...path,[r,c]],early:true,door:true});
        }else{
          moves.push({row:r,col:c,path:[...path,[r,c]],early:true});
        }
      }
    }

    const cur=G.board[r][c];
    // Web stop — Speedster lv2+ without torch: pass through but -2 movement
    if(cur.type==='web'&&rem<steps){
      if(!webImmune(player)){moves.push({row:r,col:c,path:[...path,[r,c]],web:true});continue}
      if(player.ch==='speedster'&&player.lv>=2&&!hasItem(player,'torch')){
        // Speedster passes web but loses 2 extra steps
        const newRem=Math.max(0,rem-2);
        if(newRem===0){moves.push({row:r,col:c,path:[...path,[r,c]]});continue}
        const k2=`${r},${c},${newRem}`;if(!vis.has(k2)){vis.add(k2);q.push([r,c,newRem,[...path,[r,c]]])}
        continue;
      }
    }
    // Forced-stop trap (must stop here, cannot pass through)
    if(cur.forcedStop&&cur.type==='trap'&&rem<steps){
      moves.push({row:r,col:c,path:[...path,[r,c]]});continue;
    }
    // Arrow redirect
    if(cur.type==='arrow'&&rem<steps){
      let nr=r,nc=c;
      if(cur.extra==='u')nr--;else if(cur.extra==='d')nr++;else if(cur.extra==='l')nc--;else if(cur.extra==='r')nc++;
      if(nr>=0&&nr<G.board.length&&nc>=0&&nc<G.board[0].length){
        const k=`${nr},${nc},${rem-1}`;if(!vis.has(k)){vis.add(k);q.push([nr,nc,rem-1,[...path,[r,c]]])}
      }
      continue;
    }
    // Portal teleport
    if(cur.type==='portal'&&rem<steps&&canPortal(player)){
      const pair=PORTALS[cur.extra];
      if(pair){const other=pair.find(p=>p[0]!==r||p[1]!==c)||pair[1];
        if(!(isDeepDelve(other[0])&&!isDeepDelve(player.row)&&!canEnterDeepDelve(player))){
          const k=`${other[0]},${other[1]},${rem}`;if(!vis.has(k)){vis.add(k);q.push([other[0],other[1],rem,[...path,[r,c]]])}
        }}
    }
    // Normal moves
    for(const[nr,nc]of getAdj(r,c,player)){
      const k=`${nr},${nc},${rem-1}`;if(vis.has(k))continue;
      // Block entry into final zone unless player entered via dungeon door with 175+ pts
      if(isFinalZone(nr,nc)&&!canEnterFinalZone(player))continue;
      // Block entry into deep delve (rows 10-12) without 30+ pts
      if(isDeepDelve(nr)&&!isDeepDelve(player.row)&&!canEnterDeepDelve(player))continue;
      const prev=path.length>0?path[path.length-1]:[player.row,player.col];
      if(nr===prev[0]&&nc===prev[1])continue; // no zigzag
      vis.add(k);q.push([nr,nc,rem-1,[...path,[r,c]]]);
    }
  }

  // Deduplicate by destination
  const seen=new Set();
  G.moves=moves.filter(m=>{const k=`${m.row},${m.col}`;if(seen.has(k))return false;seen.add(k);return true});
}

// Free movement: any tile within N steps in any direction (horizontal + vertical) (for Mystery Box 8)
function calcFreeMoves(player,maxSteps){
  const moves=[];const vis=new Set();
  const q=[[player.row,player.col,0,[]]];
  vis.add(`${player.row},${player.col}`);
  const rows=G.board.length,cols=G.board[0].length;

  while(q.length){
    const[r,c,steps,path]=q.shift();
    if(steps>0){
      const t=G.board[r][c];
      if(t.type!=='empty')moves.push({row:r,col:c,path:[...path,[r,c]]});
    }
    if(steps>=maxSteps)continue;
    // Expand: horizontal neighbors + ladders (vertical only via ladders)
    const adj=getAdj(r,c,player);
    for(const[nr,nc]of adj){
      const k=`${nr},${nc}`;
      if(vis.has(k))continue;
      if(G.board[nr][nc].type==='empty')continue;
      if(isFinalZone(nr,nc)&&!canEnterFinalZone(player))continue;
      if(isDeepDelve(nr)&&!isDeepDelve(player.row)&&!canEnterDeepDelve(player))continue;
      vis.add(k);
      q.push([nr,nc,steps+1,[...path,[r,c]]]);
    }
  }
  const seen=new Set();
  G.moves=moves.filter(m=>{const k=`${m.row},${m.col}`;if(seen.has(k))return false;seen.add(k);return true});
}

  treasure:'gold',jewel:'gold',cursedJewel:'gold',trap:'red',portal:'purple',levelUp:'green',
  coin:'green',heart:'green',coinHeart:'green',web:'red',loseTurn:'red',dungeonDoor:'purple',
  playerTile:'green',arrow:'green',start:'green',finish:'gold'};
function tileHL(type,early){if(early)return'cyan';return HL_COLORS[type]||'green'}
function hlMoves(){
  document.querySelectorAll('.tl[data-hl]').forEach(t=>t.removeAttribute('data-hl'));
  for(const m of G.moves){

}
